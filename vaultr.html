}

function renderTradeVerdict(){
  const idA = document.getElementById('tradeSelA').value;
  const idB = document.getElementById('tradeSelB').value;
  const verdictEl = document.getElementById('tradeVerdict');
  if(!idA||!idB){ verdictEl.innerHTML=''; return; }
  const all = [...gradedData,...sealedData,...rawData];
  const itemA = all.find(i=>i.id===idA);
  const itemB = all.find(i=>i.id===idB);
  if(!itemA||!itemB) return;
  const dA = getTradeItemData(itemA);
  const dB = getTradeItemData(itemB);
  const diff = dB.val - dA.val;
  const diffPct = dA.val > 0 ? (diff/dA.val*100) : 0;

  let cls, txt, icon;
  if(diff > dA.val * 0.05){
    cls='favorable'; icon='✅';
    txt=`Fordelagtigt trade — du modtager ${fmtDKK(dB.val)} for ${fmtDKK(dA.val)} (${diffPct>=0?'+':''}${diffPct.toFixed(1)}%). Du tjener ${fmtDKK(Math.abs(diff))} på handlen.`;
  } else if(diff < -dA.val * 0.05){
    cls='unfavorable'; icon='⚠️';
    txt=`Ufordelagtigt trade — du giver ${fmtDKK(dA.val)} for ${fmtDKK(dB.val)} (${diffPct.toFixed(1)}%). Du taber ${fmtDKK(Math.abs(diff))} på handlen.`;
  } else {
    cls='neutral'; icon='⚖️';
    txt=`Jævnt trade — næsten samme markedsværdi (forskel: ${fmtDKK(Math.abs(diff))}, ${Math.abs(diffPct).toFixed(1)}%).`;
  }

  // AI-faktor
  const aiA = dA.ai?.overall_score||0, aiB = dB.ai?.overall_score||0;
  let aiFactor = '';
  if(aiA && aiB){
    if(aiB > aiA+1) aiFactor = ` AI-score taler for handlen: modtaget kort scorer ${aiB}/10 vs. ${aiA}/10.`;
    else if(aiA > aiB+1) aiFactor = ` AI-score taler imod: dit kort scorer ${aiA}/10 vs. ${aiB}/10.`;
  }

  verdictEl.innerHTML = `<div class="trade-verdict ${cls}">${icon} ${txt}${aiFactor}</div>`;
}

function renderPerGameModule(){
  const all = [...gradedData,...sealedData,...rawData];
  if(all.length === 0) return '<div style="font-size:.8rem;color:var(--muted)">Upload data for at se TCG oversigt.</div>';

  // Grupper per TCG/kategori
  const games = {};
  all.forEach(i => {
    const g = i.category || 'Andet';
    if(!games[g]) games[g] = { items:[], cost:0, val:0, graded:0, sealed:0, raw:0, ai:[] };
    games[g].items.push(i);
    games[g].cost += totC(i);
    games[g].val  += totV(i);
    if(gradedData.find(x=>x.id===i.id)) games[g].graded++;
    else if(sealedData.find(x=>x.id===i.id)) games[g].sealed++;
    else games[g].raw++;
    const ai = aiCache[i.id];
    if(ai?.overall_score) games[g].ai.push(ai.overall_score);
  });

  const totalVal = all.reduce((s,i)=>s+totV(i),0);
  const sortedGames = Object.entries(games).sort((a,b)=>b[1].val-a[1].val);

  const rows = sortedGames.map(([name, g]) => {
    const pl = g.val - g.cost;
    const plPct = g.cost > 0 ? (pl/g.cost*100) : 0;
    const plCls = pl >= 0 ? 'green' : 'red';
    const share = totalVal > 0 ? (g.val/totalVal*100) : 0;
    const avgAI = g.ai.length ? (g.ai.reduce((a,b)=>a+b,0)/g.ai.length) : null;
    const topItem = [...g.items].sort((a,b)=>totV(b)-totV(a))[0];
    const barW = Math.max(3, share);

    // Minibar
    const typeBar = `
      <div style="display:flex;height:4px;border-radius:2px;overflow:hidden;gap:1px;width:80px">
        ${g.graded ? `<div style="flex:${g.graded};background:var(--blue)" title="Graderet: ${g.graded}"></div>` : ''}
        ${g.sealed ? `<div style="flex:${g.sealed};background:var(--purple)" title="Sealed: ${g.sealed}"></div>` : ''}
        ${g.raw    ? `<div style="flex:${g.raw};background:var(--green)" title="Raw: ${g.raw}"></div>` : ''}
      </div>`;

    return `<tr>
      <td style="font-weight:700;font-size:.8rem">${esc(name)}</td>
      <td class="num">${g.items.length}</td>
      <td class="num gold">${fmtDKK(g.val)}</td>
      <td class="num ${plCls}">${plPct>=0?'+':''}${plPct.toFixed(1)}%</td>
      <td class="num">
        <div style="display:flex;align-items:center;gap:.4rem">
          <div style="width:60px;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden">
            <div style="width:${barW.toFixed(1)}%;height:100%;background:var(--primary);border-radius:3px"></div>
          </div>
          <span style="font-size:.72rem">${share.toFixed(1)}%</span>
        </div>
      </td>
      <td>${typeBar}</td>
      <td style="font-size:.72rem;color:var(--muted);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${topItem?esc(topItem.productName):''}">${topItem?esc(topItem.productName.substring(0,22)):'—'}</td>
      <td class="num">${avgAI ? `<span class="score-badge score-${scoreColor(Math.round(avgAI))}" style="cursor:default">${avgAI.toFixed(1)}</span>` : '<span style="color:var(--faint)">—</span>'}</td>
    </tr>`;
  }).join('');

  return `
    <div style="overflow-x:auto">
    <table class="dash-table">
      <thead><tr>
        <th>TCG</th>
        <th class="num">Poster</th>
        <th class="num">Markedsværdi</th>
        <th class="num">P/L %</th>
        <th class="num">Andel</th>
        <th>Type</th>
        <th>Top position</th>
        <th class="num">AI avg</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    </div>
    <div style="display:flex;gap:.5rem;margin-top:.6rem;font-size:.67rem;color:var(--faint);align-items:center">
      <div style="width:10px;height:4px;background:var(--blue);border-radius:1px"></div>Graderet
      <div style="width:10px;height:4px;background:var(--purple);border-radius:1px"></div>Sealed
      <div style="width:10px;height:4px;background:var(--green);border-radius:1px"></div>Raw
    </div>`;
}

          parsed.forEach(w => watchlistData.push(w));
        }
      } catch(e){}
    }
    renderWatchlist();
    // Hent evt. nye data fra Supabase i baggrunden
    if(supaUser) loadWatchlistFromSupabase().then(() => renderWatchlist());
  }
  else { render(); }
}

function parseCSV(text){
  const lines=text.split(/\r?\n/), headers=splitLine(lines[0]), rows=[];
  for(let i=1;i<lines.length;i++){
    const line=lines[i].trim(); if(!line) continue;
    const vals=splitLine(line), obj={};
    headers.forEach((h,idx)=>{ obj[h.trim()]=(vals[idx]||'').trim(); });
    rows.push(obj);
  }
  return rows;
}
function splitLine(line){
  const res=[]; let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    if(line[i]==='"'){inQ=!inQ;continue;}
    if(line[i]===','&&!inQ){res.push(cur);cur='';continue;}
    cur+=line[i];
  }
  res.push(cur); return res;
}
function pNum(s){ return parseFloat((s||'').replace(/,/g,''))||0; }
// ── Grade-parser: udtræk udbyder, numerisk score og label ──
function parseGradeField(gradeStr){
  if(!gradeStr || gradeStr==='Ungraded') return { gradingProvider:'', gradeScore:null, gradeLabel:'Ungraded' };
  const s = gradeStr.trim();
  // Kendte udbydere (rækkefølge vigtig — længere matches først)
  const providers = ['PSA','BGS','CGC','TAG','ACE','AGS'];
  let provider = '';
  for(const p of providers){
    if(s.toUpperCase().startsWith(p)){ provider = p; break; }
  }
  if(!provider) return { gradingProvider:'', gradeScore:null, gradeLabel:s };
  // Udtræk numerisk score — fx "10.0", "9.5", "8"
  const scoreMatch = s.match(/([\d]+(?:\.\d+)?)/); 
  const score = scoreMatch ? parseFloat(scoreMatch[1]) : null;
  // Label = alt efter score-nummeret, trimmet
  const labelMatch = s.match(/[\d]+(?:\.\d+)?\s*(.*)/);
  const label = labelMatch ? labelMatch[1].trim() : '';
  return { gradingProvider: provider, gradeScore: score, gradeLabel: label || s };
}

function csvRowToItem(row){
  const gradeRaw = row['Grade']||'';
  const { gradingProvider, gradeScore, gradeLabel } = parseGradeField(gradeRaw);
  // Håndter skiftende kolonnenavn for markedspris (dato kan variere)
  const mktKey = Object.keys(row).find(k => k.startsWith('Market Price')) || '';
  return {
    id: Math.random().toString(36).slice(2)+Date.now().toString(36),
    portfolioName: row['Portfolio Name']||'',
    category:      row['Category']||'',
    set:           row['Set']||'',
    productName:   row['Product Name']||'',
    cardNumber:    row['Card Number']||'',
    rarity:        row['Rarity']||'',
    variance:      row['Variance']||'',
    grade:         gradeRaw,
    gradingProvider: gradingProvider,
    gradeScore:    gradeScore,
    gradeLabel:    gradeLabel,
    condition:     row['Card Condition']||'',
    costPaid:      pNum(row['Average Cost Paid']),
    quantity:      parseInt(row['Quantity'])||1,
    marketPrice:   pNum(mktKey ? row[mktKey] : row['Market Price (As of 2026-03-15)']),
    priceOverride: pNum(row['Price Override'])||0,
    watchlist:     (row['Watchlist']||'').toLowerCase()==='true',
    dateAdded:     row['Date Added']||'',
    notes:         (row['Notes']||'').replace(/;/g,'').trim(),
  };
}
// ── Smart CSV kategorisering baseret på Portfolio Name ──
// Returnerer: 'graded' | 'sealed' | 'raw' | 'watchlist'
function detectCategory(item){
  const pf = (item.portfolioName||'').toLowerCase().trim();
  // Eksplicit Portfolio Name-match
  if(pf.includes('graded')) return 'graded';
  if(pf.includes('sealed')) return 'sealed';
  if(pf.includes('raw'))    return 'raw';
  // Tomt Portfolio Name = watchlist (costPaid === 0 og watchlist-flag)
  if(!pf){
    if(item.watchlist || item.costPaid === 0) return 'watchlist';
  }
  // Auto-detect fra data
  const hasGrade = item.grade && item.grade !== 'Ungraded' && item.grade !== '';
  const hasCardNumber = item.cardNumber && item.cardNumber !== '';
  const nameLower = (item.productName||'').toLowerCase();
  const sealedKeywords = ['booster box','elite trainer box','etb','case','collection box','blister','tin','bundle','display','booster bundle'];
  const looksSealed = !hasCardNumber && sealedKeywords.some(k => nameLower.includes(k));
  if(hasGrade && item.gradingProvider) return 'graded';
  if(hasGrade) return 'graded';
  if(looksSealed) return 'sealed';
  return 'raw';
}

function handleCSV(input){
  const files = Array.from(input.files);
  if(!files.length) return;
  input.value = '';

  // Parse alle filer først
  let pending = files.length;
  const allRows = [];
  files.forEach(file => {
    const r = new FileReader();
    r.onload = e => {
      parseCSV(e.target.result).forEach(row => allRows.push(row));
      pending--;
      if(pending === 0) showCSVImportModal(allRows, files.map(f=>f.name));
    };
    r.readAsText(file, 'UTF-8');
  });
}

async function executeCSVImport(){
  try {
  const modal = document.getElementById('csvImportModal');
  const modeEl = modal ? modal.querySelector('input[name="csvMode"]:checked') : null;
  const mode = modeEl ? modeEl.value : 'replace';
  const previewItems = _pendingCSVParsed || [];
  modal && modal.remove();

  if(!previewItems.length){
    showToast('⚠️ Ingen data at importere — prøv at uploade CSV-filen igen');
    return;
  }

  // Vis loading-toast med det samme
  showToast('⏳ Importerer... vent venligst');

  if(mode === 'replace'){
    // 1) Ryd lokalt
    gradedData.length = 0;
    sealedData.length = 0;
    rawData.length = 0;
    // 2) Ryd cloud kun hvis logget ind
    if(supaUser && supa) await clearAllCloudData();
  }

  let gAdd=0, sAdd=0, rAdd=0, wSkip=0;
  previewItems.forEach(({ item, cat }) => {
    if(cat === 'watchlist'){ wSkip++; return; }  // spring watchlist over
    if(cat === 'graded'){
      const dup = gradedData.find(d => d.productName===item.productName && d.cardNumber===item.cardNumber && d.grade===item.grade);
      if(!dup){ gradedData.push(item); gAdd++; }
    } else if(cat === 'sealed'){
      const dup = sealedData.find(d => d.productName===item.productName && d.set===item.set);
      if(!dup){ sealedData.push(item); sAdd++; }
    } else {
      const dup = rawData.find(d => d.productName===item.productName && d.cardNumber===item.cardNumber && d.set===item.set);
      if(!dup){ rawData.push(item); rAdd++; }
    }
  });

  // Gem lokalt ALTID (virker også uden login)
  saveAll();

  // Cloud sync — batch upsert (3 kald i stedet for ét per item)
  if(supaUser && supa){
    try{
      if(gradedData.length){
        const batch = gradedData.map(it=>({id:it.id, user_id:supaUser.id, data:it}));
        const {error:e1} = await supa.from('graded_items').upsert(batch, {onConflict:'id'});
        if(e1) console.warn('Graded batch upsert fejl:', e1.message);
      }
      if(sealedData.length){
        const batch = sealedData.map(it=>({id:it.id, user_id:supaUser.id, data:it}));
        const {error:e2} = await supa.from('sealed_items').upsert(batch, {onConflict:'id'});
        if(e2) console.warn('Sealed batch upsert fejl:', e2.message);
      }
      if(rawData.length){
        const batch = rawData.map(it=>({id:it.id, user_id:supaUser.id, data:it}));
        const {error:e3} = await supa.from('raw_items').upsert(batch, {onConflict:'id'});
        if(e3) console.warn('Raw batch upsert fejl:', e3.message);
      }
    } catch(syncErr){
      console.warn('Batch cloud sync fejl (data er gemt lokalt):', syncErr);
    }
  } else {
    console.log('Ikke logget ind — data gemt lokalt kun');
  }

  const parts = [];
  if(gAdd>0) parts.push(`${gAdd} graderede`);
  if(sAdd>0) parts.push(`${sAdd} sealed`);
  if(rAdd>0) parts.push(`${rAdd} raw`);
  const modeStr = mode === 'replace' ? ' (erstattet)' : ' (tilføjet)';
  showToast('✅ ' + (parts.join(', ') || '0 nye') + modeStr);
  render();
  } catch(importErr) {
    console.error('Import fejl:', importErr);
    showToast('❌ Import fejl: ' + (importErr.message || String(importErr)));
    render(); // render alligevel så data vises hvis noget kom igennem
  }
}

const eff   = i => i.priceOverride>0 ? i.priceOverride : i.marketPrice;
const totV  = i => eff(i)*i.quantity;
const totC  = i => i.costPaid*i.quantity;
const plAbs = i => totV(i)-totC(i);
const plPct = i => { const c=totC(i); return c===0?null:((totV(i)-c)/c*100); };
const fmtDKK= n => (n&&n!==0)?n.toLocaleString('da-DK',{minimumFractionDigits:0,maximumFractionDigits:0})+' DKK':'—';
const fmtP  = n => n===null?'—':(n>=0?'+':'')+n.toFixed(1)+'%';
const esc   = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function gradeClass(g){
  if(!g||g==='Ungraded') return '';
  const l=g.toLowerCase();
  // PSA grades
  if(l.startsWith('psa')){
    if(l.includes('10')) return 'pill-psa10';
    if(l.includes('9.5')||l.includes(' 9 ')) return 'pill-psa9';
    if(l.includes('8')) return 'pill-psa8';
    return 'pill-psa9';
  }
  // BGS grades
  if(l.startsWith('bgs')){
    if(l.includes('10')||l.includes('black label')) return 'pill-bgs-black';
    if(l.includes('9.5')) return 'pill-psa10';
    return 'pill-bgs';
  }
  // CGC grades
  if(l.startsWith('cgc')){
    if(l.includes('10')||l.includes('pristine')) return 'pill-psa10';
    return 'pill-cgc';
  }
  // TAG, ACE, AGS — generisk styling
  if(l.startsWith('tag')||l.startsWith('ace')||l.startsWith('ags')) return 'pill-tag';
  // Fallback: gem / mint
  if(l.includes('gem')||l.includes('pristine')) return 'pill-psa10';
  if(l.includes('mint')) return 'pill-psa9';
  if(l.includes('nm')) return 'pill-psa8';
  return 'pill-psa9';
}
function catClass(c){
  const l=(c||'').toLowerCase();
  if(l.includes('pokemon')||l.includes('pokémon')) return 'pill-poke';
  if(l.includes('one piece')) return 'pill-op';
  if(l.includes('magic')) return 'pill-mtg';
  if(l.includes('rift')) return 'pill-rb';
  return '';
}
function scoreColor(s){
  if(s>=9) return 'grade'; if(s>=7) return 'high'; if(s>=4) return 'mid'; return 'low';
}

// ── Hurtig split-prompt (system+user) — lav latency optimeret ──
function buildPromptSplit(item){
  const isGraded = item.grade && item.grade!=='Ungraded';
  const isSealed = (item.portfolioName||'').toLowerCase().includes('sealed');
  const mkt = totV(item), cost = totC(item), pl = plAbs(item), pct = plPct(item);
  const lc = liveCache[item.id];
  const liveStr = lc && (lc.lowestNM||lc.trendPrice) ? 'Live CM: '+fmtDKK(lc.lowestNM||lc.trendPrice) : '';
  const langNote = currentLang==='da'?'Svar på DANSK.':currentLang==='en'?'Reply in ENGLISH.':currentLang==='ja'?'日本語で回答。':currentLang==='ko'?'한국어로 답변.':currentLang==='zh'?'请用中文回答。':currentLang==='de'?'Auf DEUTSCH antworten.':currentLang==='fr'?'Répondre en FRANÇAIS.':currentLang==='es'?'Responder en ESPAÑOL.':currentLang==='pt'?'Responder em PORTUGUÊS.':currentLang==='it'?'Rispondere in ITALIANO.':'Reply in ENGLISH.';
  const recOpts = isGraded?'"Sælg"|"Behold graderet"':isSealed?'"Sælg"|"Behold sealed"':'"Sælg"|"Behold råt"|"Send til grading"';
  const itemType = isGraded?('Graded '+item.grade):isSealed?'Sealed':('Raw '+(item.condition||'?'));
  const systemPrompt = 'You are a Pokémon TCG investment analyst. '+langNote+' Reply with ONLY valid JSON — no markdown, no extra text. PSA grading: NEVER invent % probabilities — use qualitative descriptions only (NM="strong PSA 9/10 candidate", LP="PSA 8-9 likely", MP="PSA 7-8 range").';
  const lc2 = liveCache[item.id];
  const cm2 = lc2?.tcgdex?.cm;
  let trendCtx = '';
  if(cm2){
    const avg1 = cm2.averageSellPrice||cm2.avg1, avg7 = cm2.avg7, avg30 = cm2.avg30;
    if(avg1 && avg7){ const d7 = ((avg1-avg7)/avg7*100); trendCtx = ' | CM 7d trend: '+(d7>=0?'+':'')+d7.toFixed(1)+'%'; }
    if(avg7 && avg30){ const d30 = ((avg7-avg30)/avg30*100); trendCtx += ' | CM 30d: '+(d30>=0?'+':'')+d30.toFixed(1)+'%'; }
  }
  const finStr = 'Cost '+(cost>0?cost.toFixed(0)+' DKK':'?')+' | Market '+(mkt>0?mkt.toFixed(0)+' DKK':'?')+' | P/L '+(cost>0?pl.toFixed(0)+' DKK ('+fmtP(pct)+')':'?')+(liveStr?' | '+liveStr:'')+trendCtx+' | Qty: '+item.quantity;
  const itemStr = item.productName+(item.cardNumber?' #'+item.cardNumber:'')+' | Set: '+item.set+(item.rarity?' | '+item.rarity:'')+(item.variance?' | '+item.variance:'')+' | Type: '+itemType;
  const jsonSchema = '{"recommendation":'+recOpts+',"overall_score":<1-10>,"dimensions":{"price_trend":<1-10>,"demand":<1-10>,"roi_potential":<1-10>},"dimension_reasoning":{"price_trend_reasoning":"<1 sentence>","demand_reasoning":"<1 sentence>","roi_reasoning":"<1 sentence>"},"reasoning":"<2 sentences>","key_factor":"<max 8 words>"}';
  const userPrompt = 'Analyze for investment. Reply ONLY with this JSON:\n'+jsonSchema+'\n\nITEM: '+itemStr+'\nFINANCIALS: '+finStr;
  return { systemPrompt, userPrompt };
}

async function analyseItem(item){
  try {
    const { systemPrompt, userPrompt } = buildPromptSplit(item);
    const res = await fetch('https://vaultr-price-alert.mka-831.workers.dev/proxy/perplexity', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'sonar',
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user',   content: userPrompt   },
        ],
        temperature: 0.1,
        max_tokens: 400,
        search_context_size: 'low',
        return_citations: true,
      })
    });
    if(!res.ok){
      let errMsg = `HTTP ${res.status}`;
      try{
        const errData = await res.json();
        errMsg = errData?.error?.message || errData?.detail || errMsg;
      } catch(e2){}
      console.error('Perplexity API fejl:', res.status, errMsg);
      throw new Error(errMsg);
    }
    const data = await res.json();
    const content = data.choices?.[0]?.message?.content || '';
    // Extract JSON from response — strip markdown fences if present
    const stripped = content.replace(/```json?\s*/gi,'').replace(/```/g,'').trim();
    const jsonMatch = stripped.match(/\{[\s\S]*\}/);
    if(!jsonMatch){
      console.error('Intet JSON i svar:', content.substring(0,300));
      throw new Error('AI returnerede ikke gyldigt JSON');
    }
    const parsed = JSON.parse(jsonMatch[0]);
    parsed.timestamp = new Date().toISOString();
    parsed.citations = data.citations || [];
    return parsed;
  } catch(e) {
    console.error('Analyse fejl:', e);
    throw e; // re-throw so caller can show the real message
  }
}

async function runBatchAnalysis(){
  // API-nøgle håndteres server-side
  if(batchRunning){ showToast('⏳ En analyse kører allerede — vent til den er færdig'); return; }
  batchRunning = true;
  const batchTab = activeTab; // gem hvilken tab der startede analysen
  batchTabRef = batchTab; // global reference til toolbar rendering
  const tabLabel = batchTab==='graded'?'Graderede kort':batchTab==='sealed'?'Sealed':'Raw kort';
  const batchBtnEl = document.getElementById('batchBtn'); if(batchBtnEl) batchBtnEl.disabled=true;

  const data = batchTab==='graded' ? gradedData : batchTab==='sealed' ? sealedData : rawData;
  const toAnalyse = data.filter(i=>!aiCache[i.id]);
  if(toAnalyse.length===0){ showToast('✅ Alle poster er allerede analyseret'); batchRunning=false; const bbz=document.getElementById('batchBtn'); if(bbz)bbz.disabled=false; return; }

  let done=0;
  // (analyseProgress opdateres via updateProg() nedenfor)

  // Hjælpefunktion: opdater kun progress hvis vi stadig er på den rigtige tab
  const updateProg = (html) => {
    // Gem i global holder (overlever render() genopbygning af toolbar)
    const globalProg = document.getElementById('analyseProgressGlobal');
    if(globalProg) globalProg.innerHTML = html;
    // Opdater synligt element hvis det findes (samme tab)
    const visibleProg = document.getElementById('analyseProgress');
    if(visibleProg) visibleProg.innerHTML = html;
    // Vis gul kant på tab-knappen hvis brugeren er skiftet væk
    const tabBtn = document.getElementById('tab-'+batchTab);
    if(tabBtn && activeTab !== batchTab) {
      tabBtn.style.outline = '2px solid var(--primary)';
    }
  };

  updateProg(`[${tabLabel}] Analyserer <span>0</span>/${toAnalyse.length} poster...`);

  for(const item of toAnalyse){
    updateProg(`[${tabLabel}] Analyserer <span>${done+1}</span>/${toAnalyse.length}: ${esc(item.productName.substring(0,35))}...`);
    try{
      const result = await analyseItem(item);
      if(result){ aiCache[item.id]=result; saveAll(); upsertAI(item.id, result); }
    } catch(e){
      const msg=(e.message||'fejl').substring(0,60);
      updateProg(`<span style="color:var(--red)">[${tabLabel}] Fejl på "${esc(item.productName.substring(0,30))}": ${esc(msg)} — fortsætter...</span>`);
      await new Promise(r=>setTimeout(r,2000));
    }
    done++;
    await new Promise(r=>setTimeout(r,800));
  }

  batchRunning=false;
  batchTabRef = null; // nulstil så toolbar ikke viser gammel status
  const batchBtnEl2 = document.getElementById('batchBtn'); if(batchBtnEl2) batchBtnEl2.disabled=false;
  // Fjern tab-highlight
  const tabBtn = document.getElementById('tab-'+batchTab);
  if(tabBtn) tabBtn.style.outline = '';
  updateProg(`<span style="color:var(--green);font-weight:700">✓ [${tabLabel}] ${done} analyser fuldført</span>`);
  if(activeTab === batchTab) render();
  showToast(`✅ Batch-analyse færdig (${tabLabel}): ${done} poster analyseret`);
}

// Based on condition → multipliers from market data
// ═══════════════════════════════════════════════════════
const PSA_MULTIPLIERS = {
  // condition (lowercase) → {psa8, psa9, psa10} multiplier vs raw price
  // Source: historical avg premiums from eBay sold data
  'mint':              {psa8:1.2, psa9:2.8,  psa10:6.5},
  'near mint':         {psa8:1.1, psa9:2.2,  psa10:4.5},
  'nm':                {psa8:1.1, psa9:2.2,  psa10:4.5},
  'near mint-mint':    {psa8:1.1, psa9:2.4,  psa10:5.0},
  'nm-mint':           {psa8:1.1, psa9:2.4,  psa10:5.0},
  'lightly played':    {psa8:1.0, psa9:1.5,  psa10:null},
  'lp':                {psa8:1.0, psa9:1.5,  psa10:null},
  'moderately played': {psa8:0.8, psa9:null,  psa10:null},
  'mp':                {psa8:0.8, psa9:null,  psa10:null},
  'heavily played':    {psa8:null, psa9:null, psa10:null},
  'hp':                {psa8:null, psa9:null, psa10:null},
  'damaged':           {psa8:null, psa9:null, psa10:null},
};

function getPSAMultipliers(condition) {
  if(!condition) return null;
  const c = condition.toLowerCase().trim();
  return PSA_MULTIPLIERS[c] || null;
}

function renderPSAPotential(item) {
  const rawPrice = totV(item);
  if(!rawPrice || rawPrice <= 0) return '<span class="psa-na">Ingen markedspris</span>';
  const mults = getPSAMultipliers(item.condition);
  if(!mults) return `<span class="psa-na" title="${esc(item.condition||'Ukendt stand')}">Stand ukendt</span>`;

  const badges = [];
  if(mults.psa8) badges.push(`<div class="psa-badge psa8"><span class="psa-grade">PSA 8</span><span class="psa-val">${fmtDKK(rawPrice * mults.psa8)}</span></div>`);
  if(mults.psa9) badges.push(`<div class="psa-badge psa9"><span class="psa-grade">PSA 9</span><span class="psa-val">${fmtDKK(rawPrice * mults.psa9)}</span></div>`);
  if(mults.psa10) badges.push(`<div class="psa-badge psa10"><span class="psa-grade">PSA 10</span><span class="psa-val">${fmtDKK(rawPrice * mults.psa10)}</span></div>`);

  if(badges.length === 0) return `<span class="psa-na" title="Stand for lav til PSA-præmium">Lav stand</span>`;
  return `<div class="psa-pot">${badges.join('')}</div>`;
}

function initDragDrop() {
  // Brug #dashModules som direkte parent for drag-drop
  const container = document.getElementById('dashModules') || document.getElementById('dashboardPanel');
  let dragSrc = null;

  // Touch drag support (Safari/iPad)
  let touchDragSrc = null, touchPlaceholder = null;
  function initTouchDrag(module){
    const header = module.querySelector('.module-header');
    if(!header) return;
    let startY, startX, origY, lastOver;
    header.addEventListener('touchstart', e => {
      if(e.touches.length !== 1) return;
      touchDragSrc = module;
      const t = e.touches[0];
      startX = t.clientX; startY = t.clientY;
      const rect = module.getBoundingClientRect();
      origY = rect.top;
      module.style.opacity = '0.4';
      module.style.transition = 'none';
    }, {passive: true});
    header.addEventListener('touchmove', e => {
      if(!touchDragSrc || touchDragSrc !== module) return;
      e.preventDefault();
      const t = e.touches[0];
      const over = document.elementFromPoint(t.clientX, t.clientY);
      const overModule = over?.closest('.dash-module');
      if(overModule && overModule !== module){
        if(lastOver && lastOver !== overModule) lastOver.classList.remove('drag-over');
        overModule.classList.add('drag-over');
        lastOver = overModule;
      }
    }, {passive: false});
    header.addEventListener('touchend', e => {
      if(!touchDragSrc || touchDragSrc !== module) return;
      module.style.opacity = '';
      module.style.transition = '';
      if(lastOver){ lastOver.classList.remove('drag-over'); }
      const t = e.changedTouches[0];
      const over = document.elementFromPoint(t.clientX, t.clientY);
      const target = over?.closest('.dash-module');
      if(target && target !== module){
        const allMods = [...container.querySelectorAll(':scope > .dash-module')];
        const si = allMods.indexOf(module), ti = allMods.indexOf(target);
        if(si < ti) container.insertBefore(module, target.nextSibling);
        else container.insertBefore(module, target);
        saveDashLayout();
      }
      touchDragSrc = null; lastOver = null;
    });
  }

  container.querySelectorAll('.dash-module').forEach(module => {
    initTouchDrag(module);
    // Drag startes fra module-header (grab handle)
    module.addEventListener('dragstart', e => {
      dragSrc = module;
      module.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', module.dataset.moduleId || '');
    });
    module.addEventListener('dragend', () => {
      module.classList.remove('dragging');
      container.querySelectorAll('.dash-module').forEach(m => m.classList.remove('drag-over'));
      saveDashLayout();
    });
    module.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if(module !== dragSrc) {
        container.querySelectorAll('.dash-module').forEach(m => m.classList.remove('drag-over'));
        module.classList.add('drag-over');
      }
    });
    module.addEventListener('dragleave', () => {
      module.classList.remove('drag-over');
    });
    module.addEventListener('drop', e => {
      e.preventDefault();
      e.stopPropagation();
      if(dragSrc && dragSrc !== module) {
        const allModules = [...container.querySelectorAll(':scope > .dash-module')];
        const srcIdx = allModules.indexOf(dragSrc);
        const tgtIdx = allModules.indexOf(module);
        if(srcIdx < tgtIdx) container.insertBefore(dragSrc, module.nextSibling);
        else container.insertBefore(dragSrc, module);
        module.classList.remove('drag-over');
        dragSrc = null;
        saveDashLayout();
      }
    });
  });
}

function applyDashLayout() {
  if(!dashLayout) return;
  const container = document.getElementById('dashModules') || document.getElementById('dashboardPanel');
  if(!container) return;
  // Reorder
  dashLayout.forEach(({ id }) => {
    const m = container.querySelector(`.dash-module[data-module-id="${id}"]`);
    if(m) container.appendChild(m);
  });
  // Apply collapsed, span, height
  dashLayout.forEach(({ id, collapsed, span, height }) => {
    const mod = container.querySelector(`.dash-module[data-module-id="${id}"]`);
    if(!mod) return;
    const body = mod.querySelector('.module-body');
    const icon = mod.querySelector('.module-toggle');
    const spanBtn = mod.querySelector('.module-span-btn');
    // Collapsed
    if(collapsed && body) { body.classList.add('collapsed'); if(icon) icon.textContent = '＋'; }
    // Span
    if(span && span !== '1') {
      mod.dataset.span = span;
    }
    // Height
    if(height && body) { body.style.height = height; body.style.overflow = 'hidden'; }
  });
}

// toggleSpan er ikke længere i brug (erstatter af corner-resize), beholdes til bagudkompatibilitet
function toggleSpan(id) {
  const mod = document.querySelector(`.dash-module[data-module-id="${id}"]`);
  if(!mod) return;
  const cur = mod.dataset.span || '1';
  mod.dataset.span = cur === '2' ? '1' : '2';
  saveDashLayout();
}

// Resize modul både højde (vertikal) og bredde/span (horisontal) via hjørne-håndtag
function startResize(e, id) {
  e.preventDefault();
  const container = document.getElementById('dashModules');
  const mod = document.querySelector(`.dash-module[data-module-id="${id}"]`);
  if(!mod || !container) return;
  const body = mod.querySelector('.module-body');
  const handle = mod.querySelector('.module-resize');
  if(!body) return;

  const startX = e.clientX;
  const startY = e.clientY;
  const startH = body.getBoundingClientRect().height;
  const containerW = container.getBoundingClientRect().width;
  const startSpan = mod.dataset.span || '1';

  if(handle) handle.classList.add('resizing');
  body.classList.add('resizing-active');

  function onMove(ev) {
    // Vertikal: ændr højde
    const dy = ev.clientY - startY;
    const newH = Math.max(80, startH + dy);
    body.style.height = newH + 'px';
    body.style.overflowY = 'auto';

    // Horisontal: skift til span 2 hvis trækker mere end 15% af containerbredden til højre
    const dx = ev.clientX - startX;
    const threshold = containerW * 0.15;
    if(dx > threshold && mod.dataset.span !== '2') {
      mod.dataset.span = '2';
    } else if(dx < -threshold && mod.dataset.span !== '1') {
      mod.dataset.span = '1';
    }
  }
  function onUp() {
    if(handle) handle.classList.remove('resizing');
    body.classList.remove('resizing-active');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    // Fortæl Chart.js at den skal genberegne størrelse
    Object.values(dashCharts).forEach(ch => { try { ch.resize(); } catch(e){} });
    saveDashLayout();
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

const KNOWN_EVENTS = [

  { date: '2026-04-11', name: 'Scarlet & Violet set rotation', tcg: 'Pokemon', type: 'rotation' },

];

function renderSpikeTracker() {
  const now = new Date();
  const today = now.toISOString().slice(0, 10);

  // ── Timeline ──────────────────────────────────────────
  const typeColors = {
    release:  { bg: 'color-mix(in srgb,var(--teal) 15%,transparent)',  border: 'var(--teal)',    text: 'var(--teal)' },
    reprint:  { bg: 'color-mix(in srgb,#f97316 15%,transparent)',       border: '#f97316',        text: '#f97316' },
    rotation: { bg: 'color-mix(in srgb,var(--red) 15%,transparent)',    border: 'var(--red)',     text: 'var(--red)' },
    ban:      { bg: 'color-mix(in srgb,var(--red) 15%,transparent)',    border: 'var(--red)',     text: 'var(--red)' },
    default:  { bg: 'color-mix(in srgb,var(--muted) 15%,transparent)',  border: 'var(--muted)',   text: 'var(--muted)' },
  };

  const upcomingEvents = KNOWN_EVENTS
    .map(ev => {
      const evDate = new Date(ev.date);
      const diffMs = evDate - now;
      const daysLeft = Math.ceil(diffMs / (1000 * 60 * 60 * 24));
      return { ...ev, daysLeft };
    })
    .filter(ev => ev.daysLeft >= -7) // show events up to 7 days past
    .sort((a, b) => a.daysLeft - b.daysLeft);

  const timelineHTML = upcomingEvents.map(ev => {
    const c = typeColors[ev.type] || typeColors.default;
    const countdownText = ev.daysLeft < 0
      ? `<span style="color:var(--muted);font-size:.68rem">${Math.abs(ev.daysLeft)}d siden</span>`
      : ev.daysLeft === 0
        ? `<span style="color:var(--teal);font-weight:600;font-size:.68rem">I dag</span>`

  }).join('');

  // ── Spike Cache ────────────────────────────────────────
  let spikeCache = null;
  try { spikeCache = JSON.parse(localStorage.getItem('pf_spike_cache') || 'null'); } catch(e) {}
  const lastUpdated = spikeCache?.timestamp
    ? (() => { const d = new Date(spikeCache.timestamp); return d.toLocaleDateString('da-DK', { day:'numeric', month:'short' }) + ' ' + d.toLocaleTimeString('da-DK', { hour:'2-digit', minute:'2-digit' }); })()
    : null;

  // ── AI Section ────────────────────────────────────────

      const words = name.split(/[\s\-\/]+/).filter(w => w.length >= 4);
      return words.some(w => text.includes(w));
    }).slice(0, 6);

    if (mentioned.length > 0) {
      const rows = mentioned.map(item => {

        const valStr = val > 0 ? val.toFixed(0) + ' DKK' : '–';

        ${rows}
      </div>`;
    }
  }

  return `

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

async function runSpikeAnalysis() {
  if (!apiKey) { showToast('❌ Tilføj en Perplexity API-nøgle først'); return; }

  const btn = document.getElementById('btnSpikeAnalyse');
  const resultDiv = document.getElementById('spikeAnalysisResult');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spin">⟳</span> Analyserer...'; }
  if (resultDiv) { resultDiv.innerHTML = '<span style="color:var(--muted)">Henter AI-analyse...</span>'; }

  try {
    const topCards = [...gradedData, ...rawData, ...sealedData]
      .sort((a, b) => ((b.marketPrice || 0) * (b.quantity || 1)) - ((a.marketPrice || 0) * (a.quantity || 1)))
      .slice(0, 15)
      .map(i => i.productName + (i.set ? ' (' + i.set + ')' : ''));

    const prompt = `You are a TCG investment analyst. Based on current market trends (March 2026), identify which of these cards in a collector's portfolio may be experiencing price spikes or are at risk of price drops due to recent events (set releases, tournament results, reprints, bans):

Cards: ${topCards.join(', ')}

For each notable movement, provide:
1. Card name
2. Event causing the spike/drop
3. Direction: UP or DOWN
4. Magnitude: LOW/MEDIUM/HIGH
5. One-sentence reasoning

Be concise. Focus on actionable investor intelligence, not collecting advice.`;

    const resp = await fetch('https://api.perplexity.ai/chat/completions', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + apiKey, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'sonar',
        messages: [{ role: 'user', content: prompt }],
        max_tokens: 800,
        search_recency_filter: 'month',
      })
    });

    if (!resp.ok) {
      let errMsg = 'HTTP ' + resp.status;
      try { const ed = await resp.json(); errMsg = ed?.error?.message || ed?.detail || errMsg; } catch(e2) {}
      throw new Error(errMsg);
    }

    const data = await resp.json();
    const text = data.choices?.[0]?.message?.content || '';
    if (!text) throw new Error('Tomt svar fra API');

    // Cache result
    const cacheObj = { text, timestamp: Date.now() };
    localStorage.setItem('pf_spike_cache', JSON.stringify(cacheObj));

    // Re-render spike tracker body
    const body = document.getElementById('spikeTrackerBody');
    if (body) { body.innerHTML = renderSpikeTracker(); }
    showToast('✅ Spike-analyse opdateret');

  } catch(e) {
    const msg = e.message || 'Ukendt fejl';
    showToast('❌ Spike-analyse fejl: ' + msg.substring(0, 80));
    if (resultDiv) { resultDiv.innerHTML = '<span style="color:var(--red)">Fejl: ' + escapeHtml(msg) + '</span>'; }
    if (btn) { btn.disabled = false; btn.innerHTML = '🔍 Analysér aktuelle spikes (AI)'; }
  }
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function render(){
  const data = activeTab==='graded' ? gradedData : activeTab==='sealed' ? sealedData : rawData;

  let filtered = data.filter(item=>{
    const q=searchQ;
    // Smart søgning: "Charizard 25" → navn+nummer, "Charizard Base Set" → navn+sæt
    const qParts = q ? q.split(/\s+/).filter(Boolean) : [];
    const ms = !q || (() => {
      const name = item.productName.toLowerCase();
      const set  = item.set.toLowerCase();
      const num  = (item.cardNumber||'').toLowerCase();
      const grade = (item.grade||'').toLowerCase();
      const cat  = (item.category||'').toLowerCase();
      // Fuld streng match
      if(name.includes(q)||set.includes(q)||num.includes(q)||grade.includes(q)||cat.includes(q)) return true;
      // Multi-token: alle ord skal matche ét af felterne
      return qParts.every(part => name.includes(part)||set.includes(part)||num.includes(part)||grade.includes(part)||cat.includes(part));
    })();
    const mc = filterCat==='Alle' || item.category===filterCat;
    const mr = !filterRec || (aiCache[item.id]?.recommendation === filterRec);
    return ms && mc && mr;
  });

  filtered.sort((a,b)=>{
    let av,bv;
    if(sortCol==='name')  {av=a.productName;bv=b.productName;}
    else if(sortCol==='set'){av=a.set;bv=b.set;}
    else if(sortCol==='cost'){av=totC(a);bv=totC(b);}
    else if(sortCol==='value'){av=totV(a);bv=totV(b);}
    else if(sortCol==='pl'){av=plAbs(a);bv=plAbs(b);}
    else if(sortCol==='date'){av=a.dateAdded;bv=b.dateAdded;}
    else if(sortCol==='qty'){av=a.quantity;bv=b.quantity;}
    else if(sortCol==='score'){av=aiCache[a.id]?.overall_score||0;bv=aiCache[b.id]?.overall_score||0;}
    else if(sortCol==='rarity'){av=a.rarity||'';bv=b.rarity||'';}
    else if(sortCol==='cond'){av=a.condition||'';bv=b.condition||'';}
    else {av=a.productName;bv=b.productName;}
    if(typeof av==='string') return sortAsc?av.localeCompare(bv):bv.localeCompare(av);
    return sortAsc?av-bv:bv-av;
  });

  renderSummary(data, filtered);
  renderToolbar(data);
  renderTable(filtered);
}

function renderSummary(data, filtered){
  const tc=data.reduce((s,i)=>s+totC(i),0);
  const tv=data.reduce((s,i)=>s+totV(i),0);
  const tp=tv-tc;
  const pct=tc>0?(tp/tc*100):0;
  const cnt=data.reduce((s,i)=>s+i.quantity,0);
  const analysed=data.filter(i=>aiCache[i.id]).length;
  const plClass=tp>=0?'green':'red';
  const pctStr=(pct>=0?'+':'')+pct.toFixed(1)+'%';
  // For raw: show grading candidates (score >= 7)
  const gradeCandidates = activeTab==='raw' ? data.filter(i=>aiCache[i.id]&&aiCache[i.id].recommendation==='Send til grading').length : 0;

  document.getElementById('summaryBar').innerHTML=
    `<div class="stat"><span class="stat-lbl">Poster:</span><span class="stat-val">${data.length} (${cnt} stk)</span></div>`+
    `<div class="sdiv"></div>`+
    `<div class="stat"><span class="stat-lbl">Kostpris:</span><span class="stat-val">${fmtDKK(tc)}</span></div>`+
    `<div class="sdiv"></div>`+
    `<div class="stat"><span class="stat-lbl">Markedsværdi:</span><span class="stat-val gold">${fmtDKK(tv)}</span></div>`+
    `<div class="sdiv"></div>`+
    `<div class="stat"><span class="stat-lbl">P/L:</span><span class="stat-val ${plClass}">${fmtDKK(tp)} (${pctStr})</span></div>`+
    (analysed>0?`<div class="sdiv"></div><div class="stat"><span class="stat-lbl">AI-analyseret:</span><span class="stat-val blue">${analysed}/${data.length}</span></div>`:'')+
    (gradeCandidates>0?`<div class="sdiv"></div><div class="stat"><span class="stat-lbl">Send til grading:</span><span class="stat-val" style="color:var(--teal);font-weight:700">${gradeCandidates} kort</span></div>`:'');
}

function renderToolbar(data){
  const cats=['Alle',...new Set(data.map(d=>d.category).filter(Boolean))];
  const chips=cats.map(c=>`<button class="chip${filterCat===c?' active':''}" onclick="setFilterCat('${esc(c)}')">${esc(c)}</button>`).join('');
  // AI filter: vis kun specifikke anbefalinger
  const aiRecs = [...new Set(data.map(d=>aiCache[d.id]?.recommendation).filter(Boolean))];
  const aiFilterChips = aiRecs.length ? `
    <div style="display:flex;gap:.3rem;flex-wrap:wrap;align-items:center;margin-left:auto">
      <span style="font-size:.65rem;color:var(--muted);font-weight:600">AI:</span>
      <button class="chip${filterRec===''?' active':''}" onclick="setFilterRec('')" style="font-size:.68rem;padding:.1rem .4rem">Alle</button>
      ${aiRecs.map(r=>`<button class="chip${filterRec===r?' active':''}" onclick="setFilterRec('${esc(r)}')" style="font-size:.68rem;padding:.1rem .4rem">${esc(r)}</button>`).join('')}
    </div>` : '';

  const sortOpts=activeTab==='graded'
    ?`<option value="name">Navn</option><option value="set">Sæt</option><option value="score">AI-score</option><option value="value">Markedspris</option><option value="pl">P/L</option><option value="date">Dato</option>`
    :activeTab==='raw'
    ?`<option value="name">Navn</option><option value="set">Sæt</option><option value="rarity">Raritet</option><option value="score">AI-score</option><option value="value">Markedspris</option><option value="pl">P/L</option><option value="date">Dato</option>`
    :`<option value="name">Navn</option><option value="set">Sæt</option><option value="qty">Antal</option><option value="score">AI-score</option><option value="value">Markedspris</option><option value="pl">P/L</option>`;
  // Vis kun progress på den tab der faktisk kører analysen
  const isAnalysingThisTab = batchRunning && (typeof batchTabRef !== 'undefined') && batchTabRef === activeTab;
  const globalProgEl = document.getElementById('analyseProgressGlobal');
  const progHtml = isAnalysingThisTab && globalProgEl
    ? `<div class="analyse-progress" id="analyseProgress" style="flex:1">${globalProgEl.innerHTML}</div>`
    : `<div class="analyse-progress" id="analyseProgress" style="flex:1"></div>`;
  document.getElementById('toolbar').innerHTML=chips+(aiFilterChips||'')+`<div class="tb-sep"></div><select class="sort-sel" onchange="setSort(this.value)" id="sortSel">${sortOpts}</select><div class="tb-sep"></div><button class="btn-analyse-all" id="batchBtn" onclick="runBatchAnalysis()" ${apiKey?'':'disabled'}>` +
    `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2a10 10 0 1 0 10 10"/><path d="m17 7 5-5"/><path d="M17 2h5v5"/></svg> Analyser alle (AI)</button>`+progHtml;
  document.getElementById('sortSel').value=sortCol;
}

function setFilterCat(c){ filterCat=c; render(); }
function setFilterRec(r){ filterRec=r; render(); }
function setSort(c){ sortCol===c?sortAsc=!sortAsc:(sortCol=c,sortAsc=true); render(); }
function thA(c){ const s=sortCol===c; return `<span class="s-arr">${s?(sortAsc?'↑':'↓'):'↕'}</span>`; }

function renderAICell(item){
  const ai=aiCache[item.id];

  }
  const rec=ai.recommendation||'Uafgjort';
  const score=ai.overall_score||0;
  const cls=rec==='Sælg'||rec==='Sell'||rec===t('sell')?'score-sell':rec==='Send til grading'||rec==='Send to grading'||rec===t('grade')?'score-grade':score>=9?'score-grade':score>=7?'score-hold':'score-sell';
  const expanded=expandedRows.has(item.id);
  // Sprogindikator
  const _nl=(item.productName||'').toLowerCase();
  const _langTag = _nl.includes('(jp)') ? 'JP'

    : _nl.includes('(fr)') ? 'FR'
    : _nl.includes('(kr)')||_nl.includes('(ko)') ? 'KR'
    : _nl.includes('(zh)')||_nl.includes('(cn)') ? 'CN'
    : (item.language && item.language.toLowerCase()!=='english' && item.language!=='') ? item.language.substring(0,2).toUpperCase()
    : null;
  const _langHtml = (_langTag && _langTag!=='EN') ? `<span class="lang-pill">${_langTag}</span>` : '';
  // Cache-alder indikator
  const _ts = ai.timestamp ? new Date(ai.timestamp) : null;
  const _ageDays = _ts ? Math.floor((Date.now()-_ts.getTime())/(1000*60*60*24)) : null;
  const _ageHtml = _ageDays!==null
    ? `<span style="font-size:.6rem;color:var(--muted);margin-left:.15rem" title="Analyseret ${_ts.toLocaleDateString('da-DK')}">${_ageDays===0?'i dag':_ageDays===1?'1 dag':_ageDays+'d'}</span>`
    : '';

    </div>

}

// PRISHISTORIK GRAF — Chart.js interaktiv graf per kort

function renderPriceChartPanel(item){
  const snaps = priceHistory[item.id] || [];
  const lc = liveCache[item.id];
  const cm = lc?.tcgdex?.cm;
  const canvasId = 'price-chart-'+item.id;

  // Byg datapunkter: syntetiske CM-averages + rigtige snapshots
  let points = [];
  const now = Date.now();
  if(cm){
    if(cm.avg30) points.push({ price: cm.avg30, ts: now - 30*24*60*60*1000, label: '30d avg', synthetic: true });
    if(cm.avg7)  points.push({ price: cm.avg7,  ts: now - 7*24*60*60*1000,  label: '7d avg',  synthetic: true });
    if(cm.avg1)  points.push({ price: cm.avg1,  ts: now - 1*24*60*60*1000,  label: '1d avg',  synthetic: true });
    if(cm.trendPrice) points.push({ price: cm.trendPrice, ts: now, label: 'Trend', synthetic: true });
  }
  // Tilføj rigtige snapshots (overskriv syntetiske)
  snaps.forEach(s => points.push({ price: s.price, ts: s.ts, synthetic: false }));
  points.sort((a,b) => a.ts-b.ts);
  // Dedupliker tætte punkter
  const deduped = [];
  points.forEach(p => {
    const last = deduped[deduped.length-1];
    if(!last || Math.abs(p.ts-last.ts) > 2*60*60*1000) deduped.push(p);
  });
  points = deduped;

  const hasRealData = snaps.length >= 2;
  const noDataMsg = !cm && !snaps.length
    ? '<div style="color:var(--muted);font-size:.82rem;padding:.75rem 0">Hent live priser for at se grafdata</div>'
    : '';

  if(!cm && !snaps.length) return `<div style="padding:.75rem 0;text-align:center">
    <div style="color:var(--muted);font-size:.82rem;margin-bottom:.6rem">Ingen grafdata endnu</div>
    <button class="btn-live" onclick="fetchLivePrice(gradedData.find(i=>i.id==='${item.id}')||sealedData.find(i=>i.id==='${item.id}')||rawData.find(i=>i.id==='${item.id}')).then(()=>render())" style="font-size:.75rem;padding:.25rem .65rem">🔄 Hent live priser</button>
  </div>`;

  // Statistik
  const prices = points.map(p=>p.price);
  const minP = Math.min(...prices), maxP = Math.max(...prices);
  const first = prices[0], last2 = prices[prices.length-1];
  const pct = first > 0 ? ((last2-first)/first*100) : 0;
  const pctStr = (pct>=0?'+':'')+pct.toFixed(1)+'%';
  const pctColor = pct >= 0 ? 'var(--green)' : 'var(--red)';

  // Nøgletal
  const stats = [
    cm?.trendPrice  ? `<div class="ph-stat"><span class="ph-stat-lbl">Trend</span><span class="ph-stat-val teal">€${Number(cm.trendPrice).toFixed(2)}</span></div>` : '',
    cm?.avg30       ? `<div class="ph-stat"><span class="ph-stat-lbl">30d avg</span><span class="ph-stat-val">€${Number(cm.avg30).toFixed(2)}</span></div>` : '',
    cm?.avg7        ? `<div class="ph-stat"><span class="ph-stat-lbl">7d avg</span><span class="ph-stat-val">€${Number(cm.avg7).toFixed(2)}</span></div>` : '',
    cm?.lowPrice    ? `<div class="ph-stat"><span class="ph-stat-lbl">Laveste</span><span class="ph-stat-val">€${Number(cm.lowPrice).toFixed(2)}</span></div>` : '',
  ].filter(Boolean).join('');

  const dataNote = hasRealData
    ? `${snaps.length} rigtige snapshots`
    : 'Syntetisk fra CM-averages — hent live priser dagligt for rigtig historik';

  return `<div class="price-chart-panel">
    <div class="price-chart-header">
      <span style="font-size:.8rem;font-weight:700">📈 Prishistorik</span>
      <span style="font-size:.8rem;font-weight:700;color:${pctColor};margin-left:auto">${pctStr}</span>
    </div>
    <div class="ph-stats-row">${stats}</div>
    <div id="chart-wrap-${canvasId}" style="position:relative;width:100%;height:160px;margin:.5rem 0">
      <canvas id="${canvasId}" style="display:block;width:100%;height:160px"></canvas>
    </div>
    <div style="font-size:.62rem;color:var(--faint);margin-top:.25rem">${dataNote}</div>
  </div>`;
}

// Initialiserer Chart.js graf når GRAF-tab åbnes
function initPriceChart(itemId){
  const canvasId = 'price-chart-'+itemId;
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  // Re-initialiser altid — data kan være opdateret siden sidst
  if(canvas._chartInstance){ canvas._chartInstance.destroy(); }
  canvas.dataset.chartReady = '1';
  // Sæt explicit px-størrelse så Chart.js ikke får 0x0
  const wrap = canvas.parentElement;
  if(wrap){ canvas.width = wrap.offsetWidth || 300; canvas.height = 160; }

  const snaps = priceHistory[itemId] || [];
  const lc = liveCache[itemId];
  const cm = lc?.tcgdex?.cm;
  const now = Date.now();

  let points = [];
  if(cm){
    if(cm.avg30) points.push({ price: cm.avg30, ts: now - 30*24*60*60*1000, synthetic: true });
    if(cm.avg7)  points.push({ price: cm.avg7,  ts: now - 7*24*60*60*1000,  synthetic: true });
    if(cm.avg1)  points.push({ price: cm.avg1,  ts: now - 1*24*60*60*1000,  synthetic: true });
    if(cm.trendPrice) points.push({ price: cm.trendPrice, ts: now, synthetic: true });
  }
  snaps.forEach(s => points.push({ price: s.price, ts: s.ts, synthetic: false }));
  points.sort((a,b) => a.ts-b.ts);

  const deduped = [];
  points.forEach(p => {
    const last = deduped[deduped.length-1];
    if(!last || Math.abs(p.ts-last.ts) > 2*60*60*1000) deduped.push(p);
  });

  if(deduped.length < 2){ canvas.style.display='none'; return; }

  const labels = deduped.map(p => new Date(p.ts).toLocaleDateString('da-DK',{day:'numeric',month:'short'}));
  const data   = deduped.map(p => parseFloat(p.price.toFixed(2)));
  const first  = data[0], last2 = data[data.length-1];
  const trendUp = last2 >= first;
  const lineCol = trendUp ? '#6daa45' : '#f87171';
  const fillCol = trendUp ? 'rgba(109,170,69,0.12)' : 'rgba(248,113,113,0.12)';

  // Punkt-farver: syntetisk = dashed/rund, rigtig = solid
  const pointBg = deduped.map(p => p.synthetic ? 'transparent' : lineCol);
  const pointBorder = deduped.map(p => p.synthetic ? lineCol : lineCol);
  const pointR = deduped.map(p => p.synthetic ? 2 : 4);

  if(window.Chart){
    try{ if(canvas._chartInst) canvas._chartInst.destroy(); } catch(e){}
    const chartInst = new window.Chart(canvas, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data,
          borderColor: lineCol,
          backgroundColor: fillCol,
          borderWidth: 2,
          fill: true,
          tension: 0.35,
          pointBackgroundColor: pointBg,
          pointBorderColor: pointBorder,
          pointRadius: pointR,
          pointHoverRadius: 6,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1a1a1a',
            borderColor: '#333',
            borderWidth: 1,
            titleColor: '#aaa',
            bodyColor: '#e8e8e8',
            callbacks: {
              label: ctx => ' €' + ctx.parsed.y.toFixed(2),
            }
          }
        },
        scales: {
          x: {
            grid: { color: '#ffffff08' },
            ticks: { color: '#666', font: { size: 10 }, maxTicksLimit: 6 }
          },
          y: {
            position: 'right',
            grid: { color: '#ffffff08' },
            ticks: {
              color: '#666',
              font: { size: 10 },
              callback: v => '€'+v.toFixed(2)
            }
          }
        }
      }
    });
  }
}

function renderAIDetailRow(item, colSpan){

  const dr=ai.dimension_reasoning||{};

     tooltip: t('dim_pristrend_tip')},

     tooltip: t('dim_roi_tip')},

  const ts=ai.timestamp?new Date(ai.timestamp).toLocaleString(currentLang==='da'?'da-DK':currentLang==='ja'?'ja-JP':currentLang==='ko'?'ko-KR':currentLang==='zh'?'zh-CN':'en-GB'):'';

    `<button class="detail-tab${defaultTab===tabId?' active':''}" data-item="${item.id}" data-tab="${tabId}" onclick="switchDetailTab('${item.id}','${tabId}')">${label}</button>`;

function toggleDimExpand(uid, e){
  e.stopPropagation();
  const el=document.getElementById('dim-'+uid);
  if(!el) return;
  const isOpen=el.classList.contains('open');
  // Close all others first
  document.querySelectorAll('.dim-expand.open').forEach(d=>d.classList.remove('open'));
  if(!isOpen) el.classList.add('open');
}

function submitForm(){
  const name=document.getElementById('mName')?.value.trim();
  if(!name){alert('Udfyld venligst produktnavn.');return;}
  const item={
    id:Math.random().toString(36).slice(2)+Date.now().toString(36),
    productName:name,
    set:document.getElementById('mSet')?.value.trim()||'',
    category:document.getElementById('mCat')?.value||'Pokemon',
    cardNumber:document.getElementById('mNum')?.value.trim()||'',
    rarity:document.getElementById('mRarity')?.value.trim()||'',
    grade:document.getElementById('mGrade')?.value||'',
    condition:document.getElementById('mCond')?.value||'Near Mint',
    quantity:parseInt(document.getElementById('mQty')?.value)||1,
    costPaid:parseFloat(document.getElementById('mCost')?.value)||0,
    marketPrice:parseFloat(document.getElementById('mMkt')?.value)||0,
    priceOverride:0,watchlist:false,
    dateAdded:document.getElementById('mDate')?.value||'',
    notes:document.getElementById('mNotes')?.value.trim()||'',
    portfolioName:activeTab==='graded'?'Graded portfolio':activeTab==='raw'?'Raw portfolio':'Sealed portfolio',
    variance:'',
  };
  if(activeTab==='graded') gradedData.push(item);
  else if(activeTab==='raw') rawData.push(item);
  else sealedData.push(item);
  saveAll();
  // Cloud sync
  const _tbl = activeTab==='graded'?'graded_items':activeTab==='raw'?'raw_items':'sealed_items';
  upsertItem(_tbl, item);
  closeModal(); render();
  showToast('✅ Tilføjet: '+name);
}
function closeModal(){ document.getElementById('modalBackdrop').classList.remove('open'); }

function toggleWatchlist(itemId){
  // Søg i alle arrays — activeTab kan skifte
  const item = gradedData.find(i=>i.id===itemId)
             || sealedData.find(i=>i.id===itemId)
             || rawData.find(i=>i.id===itemId);
  if(!item) return;
  const src = gradedData.find(i=>i.id===itemId)?'graded':sealedData.find(i=>i.id===itemId)?'sealed':'raw';
  const existing = watchlistData.findIndex(w=>w.id===itemId);
  if(existing>=0){
    watchlistData.splice(existing,1);
    showToast('👁 Fjernet fra Watchlist');
  } else {
    watchlistData.push({
      id: item.id,
      productName: item.productName,
      set: item.set,
      cardNumber: item.cardNumber||'',
      rarity: item.rarity||'',
      condition: item.condition||item.grade||'',
      sourceTab: src,
      targetPrice: 0,
      addedAt: new Date().toISOString().slice(0,10),
    });
    showToast('👁 Tilføjet til Watchlist');
  }
  saveAll();
  syncWatchlistToSupabase();
  render(); // refresh watchlist-knap farve
}

function saveWatchTargetPrice(itemId, val){
  const w = watchlistData.find(w=>w.id===itemId);
  if(!w) return;
  w.targetPrice = parseFloat(val)||0;
  saveAll();
  syncWatchlistToSupabase();
  // Re-render kun target+dist kolonnen for at undgå input-blur
  renderWatchlistDistCell(itemId);
}

function renderWatchlistDistCell(itemId){
  const w = watchlistData.find(x=>x.id===itemId);
  if(!w) return;
  const lc = liveCache[itemId];
  const livePrice = lc ? (lc.lowestNM||lc.trendPrice||0) : 0;
  const dist = (w.targetPrice>0 && livePrice>0) ? ((livePrice-w.targetPrice)/w.targetPrice*100) : null;
  const alarmHit = (w.targetPrice>0 && livePrice>0 && livePrice<=w.targetPrice);
  const distCell = document.getElementById('wl-dist-'+itemId);
  if(distCell){
    if(alarmHit){
      distCell.innerHTML = '<span class="wl-alarm-badge">🔔 Ramt målpris!</span>';
    } else if(dist!==null){
      const cls = dist<=10?'wl-dist-green':'wl-dist-red';
      distCell.innerHTML = `<span class="${cls}">${dist>0?'+':''}${dist.toFixed(1)}%</span>`;
    } else {
      distCell.innerHTML = '<span style="color:var(--muted)">—</span>';
    }
  }
}

async function fetchWatchlistPrices(){
  if(!watchlistData.length) return;
  for(const w of watchlistData){
    const arr = w.sourceTab==='graded'?gradedData:w.sourceTab==='sealed'?sealedData:rawData;
    const item = arr.find(i=>i.id===w.id);
    if(item) await fetchLivePrice(item);
  }
  renderWatchlist();
}

async function runWatchlistAnalysis(itemId){
  const w = watchlistData.find(x=>x.id===itemId);
  if(!w){ showToast('❌ Item ikke fundet'); return; }
  const arr = w.sourceTab==='graded'?gradedData:w.sourceTab==='sealed'?sealedData:rawData;
  const item = arr.find(i=>i.id===w.id);
  if(!item){ showToast('❌ Item ikke i portefølje'); return; }

  const btn = document.getElementById('wl-abtn-'+itemId);
  if(btn){ btn.disabled=true; btn.innerHTML='<span class="ai-thinking"><span></span><span></span><span></span></span>'; }
  try{
    const result = await analyseItem(item);
    if(result){
      aiCache[itemId]=result; saveAll(); upsertAI(itemId,result);
      showToast('🤖 AI-analyse klar');
      renderWatchlist();
      fetchLivePrice(item).then(()=>renderWatchlist());
    }
  } catch(e){
    showToast('❌ AI fejl: '+e.message);
    if(btn){ btn.disabled=false; btn.innerHTML='🤖'; }
  }
}

function removeFromWatchlist(itemId){
  watchlistData = watchlistData.filter(w=>w.id!==itemId);
  saveAll();
  syncWatchlistToSupabase();
  renderWatchlist();
  showToast('🗑 Fjernet fra Watchlist');
}

async function syncWatchlistToSupabase(){
  if(!supaUser||!supa) return;
  try{
    if(watchlistData.length){
      const batch = watchlistData.map(w=>({id:w.id,user_id:supaUser.id,data:w}));
      await supa.from('watchlist_items').upsert(batch,{onConflict:'id,user_id'});
    }
  } catch(e){ console.warn('Watchlist sync fejl:', e); }
}

async function loadWatchlistFromSupabase(){
  if(!supaUser||!supa) return;
  try{
    const { data, error } = await supa.from('watchlist_items').select('id,data').eq('user_id', supaUser.id);
    if(error){ console.warn('Watchlist load fejl:', error.message); return; }
    if(data && data.length){
      // Flet Supabase-data med localStorage (Supabase vinder)
      data.forEach(row => {
        const existing = watchlistData.findIndex(w => w.id === row.id);
        if(existing >= 0) watchlistData[existing] = row.data;
        else watchlistData.push(row.data);
      });
      saveAll();
    }
  } catch(e){ console.warn('Watchlist load fejl:', e); }
}

function renderWatchlist(){
  const container = document.getElementById('watchlistPanel');
  if(!container) return;

  if(!watchlistData.length){
    container.innerHTML = `
      <div class="wl-empty">
        <div style="font-size:2.5rem;margin-bottom:.75rem">👁</div>
        <div style="font-weight:700;font-size:1rem;margin-bottom:.4rem">Watchlist er tom</div>
        <div style="font-size:.82rem">Gå til Graderede, Sealed eller Raw kort og klik 👁 på et kort for at følge det</div>
      </div>`;
    return;
  }

  // Check for price alarms
  const alarms = watchlistData.filter(w=>{
    const lc = liveCache[w.id];
    const lp = lc?(lc.lowestNM||lc.trendPrice||0):0;
    return w.targetPrice>0 && lp>0 && lp<=w.targetPrice;
  });

  const rows = watchlistData.map(w=>{
    const lc = liveCache[w.id];
    const livePrice = lc?(lc.lowestNM||lc.trendPrice||0):0;
    const livePriceStr = livePrice>0?fmtDKK(livePrice):'<span style="color:var(--muted);font-size:.75rem">Ikke hentet</span>';
    const dist = (w.targetPrice>0 && livePrice>0) ? ((livePrice-w.targetPrice)/w.targetPrice*100) : null;
    const alarmHit = (w.targetPrice>0 && livePrice>0 && livePrice<=w.targetPrice);
    const distHtml = alarmHit
      ? '<span class="wl-alarm-badge">🔔 Ramt!</span>'
      : dist!==null
        ? `<span class="${dist<=10?'wl-dist-green':'wl-dist-red'}">${dist>0?'+':''}${dist.toFixed(1)}%</span>`
        : '<span style="color:var(--muted)">—</span>';

    const ai = aiCache[w.id];
    const aiHtml = ai
      ? `<span class="score-badge score-${scoreClass(ai.overall_score)}">${ai.overall_score}</span>`
      : `<button class="btn-live" id="wl-abtn-${w.id}" onclick="runWatchlistAnalysis('${w.id}')" style="font-size:.68rem;padding:.12rem .35rem">🤖</button>`;

    const srcPill = `<span class="wl-source-pill">${w.sourceTab}</span>`;

    return `<tr>
      <td><div class="name-cell" title="${esc(w.productName)}">${esc(w.productName)} ${srcPill}</div></td>
      <td class="hide-mob"><div class="set-cell">${esc(w.set)}</div></td>
      <td class="hide-mob muted" style="font-size:.72rem">${esc(w.condition||'—')}</td>
      <td class="num"><input class="wl-target-input" type="number" min="0" step="1" value="${w.targetPrice||''}" placeholder="0 DKK" onchange="saveWatchTargetPrice('${w.id}',this.value)" /></td>
      <td class="num gold">${livePriceStr}</td>
      <td class="num" id="wl-dist-${w.id}">${distHtml}</td>
      <td style="text-align:center">${aiHtml}</td>
      <td><button class="btn-del" onclick="removeFromWatchlist('${w.id}')">🗑</button></td>
    </tr>`;
  }).join('');

  const alarmBanner = alarms.length
    ? `<div style="background:#0c7a8515;border:1px solid var(--teal);border-radius:.5rem;padding:.6rem .9rem;margin-bottom:.75rem;font-size:.82rem;color:var(--teal);font-weight:600">
        🔔 ${alarms.length} kort har ramt eller passeret målprisen: ${alarms.map(a=>`<strong>${esc(a.productName)}</strong>`).join(', ')}
      </div>`
    : '';

  container.innerHTML = `
    <div class="wl-panel-header">
      <div class="wl-panel-title">👁 Watchlist <span style="font-size:.8rem;font-weight:400;color:var(--muted);margin-left:.35rem">${watchlistData.length} poster</span></div>
      <div style="display:flex;gap:.5rem">
        <button class="btn-live" onclick="fetchWatchlistPrices()" style="font-size:.75rem;padding:.25rem .65rem">🔄 Hent priser</button>
        ${supaUser ? `<button class="btn-live" onclick="syncWatchlistToSupabase().then(()=>showToast('✅ Watchlist synkroniseret'))" style="font-size:.72rem;padding:.2rem .5rem;opacity:.7">☁️ Synk</button>` : ''}
      </div>
    </div>
    ${alarmBanner}
    <div class="table-wrap" style="margin:0">
      <table><thead><tr>
        <th>Navn</th>
        <th class="hide-mob">Sæt</th>
        <th class="hide-mob">Stand/Grade</th>
        <th>Målpris (DKK)</th>
        <th>Live pris</th>
        <th>Afstand</th>
        <th style="text-align:center">AI</th>
        <th></th>
      </tr></thead><tbody>${rows}</tbody></table>
    </div>`;

  // Check alarms and toast
  if(alarms.length){
    alarms.forEach(a=>{
      const toastKey = 'wl_alarm_'+a.id+'_'+new Date().toDateString();
      if(!sessionStorage.getItem(toastKey)){
        showToast(`🔔 ${a.productName} har ramt målpris!`);
        sessionStorage.setItem(toastKey,'1');
      }
    });
  }
}

function deleteItem(id){
  if(!confirm('Slet denne post?')) return;
  const _delTbl = activeTab==='graded'?'graded_items':activeTab==='sealed'?'sealed_items':'raw_items';
  if(activeTab==='graded') gradedData=gradedData.filter(i=>i.id!==id);
  else if(activeTab==='sealed') sealedData=sealedData.filter(i=>i.id!==id);
  else rawData=rawData.filter(i=>i.id!==id);
  delete aiCache[id];
  saveAll();
  deleteItem(_delTbl, id);
  render();
}

function setLang(lang){
  currentLang = lang;
  localStorage.setItem('pf_lang', lang);
  saveUserSettingsToSupabase();
  document.getElementById('langSel').value = lang;
  applyLang();
  if(activeTab==='overview') renderDashboard(); else render();
}

function applyLang(){
  // Tabs
  const _to=document.getElementById('tab-overview'); if(_to) _to.textContent=t('tab_overview');
  const _tg=document.getElementById('tab-graded');   if(_tg) _tg.textContent=t('tab_graded');
  const _ts=document.getElementById('tab-sealed');   if(_ts) _ts.textContent=t('tab_sealed');
  const _tr=document.getElementById('tab-raw');      if(_tr) _tr.textContent=t('tab_raw');
  // Search
  const si = document.getElementById('searchInput');
  if(si) si.placeholder = t('search_ph');
  // API banner
  const al = document.querySelector('.api-key-label');
  if(al) al.textContent = t('api_label');
  const ask = document.querySelector('.btn-save-key');
  if(ask) ask.textContent = t('api_save');
  const ks = document.getElementById('keyStatus');
  if(ks && !apiKey) ks.textContent = t('api_no_key');
  const alink = document.querySelector('.api-banner a');
  if(alink) alink.textContent = t('api_link');
  // Batch button
  const bb = document.getElementById('batchBtn');
  if(bb) bb.childNodes[bb.childNodes.length-1].textContent = ' ' + t('analyse_all');
  // Upload label
  const ulbl = document.querySelector('.btn-primary .lbl');
  if(ulbl) ulbl.textContent = t('upload_csv');
  // Add button
  const addlbl = document.querySelectorAll('.btn-primary .lbl')[1];
  if(addlbl) addlbl.textContent = t('add');
}

(async function restoreSession(){
  try{
    const { data: { session } } = await supa.auth.getSession();
    if(session?.user && !supaUser){
      supaUser = session.user;
      document.getElementById('userChipWrap').style.display = '';
      document.getElementById('userEmail').textContent = supaUser.email;
      document.getElementById('authOverlay').classList.add('hidden');
      await loadUserSettingsFromSupabase();
      await loadFromSupabase();
      await loadPriceHistoryFromSupabase();
      await loadWatchlistFromSupabase();
      render();
      console.log('✅ Session gendannet:', supaUser.email);
    }
  } catch(e){ console.warn('Session restore fejl:', e); }
})();

// ── Auto-opdatering af live priser i baggrunden ──
// Kør ved opstart hvis > 4 timer siden sidst, derefter hver 6. time
(async function autoLivePrices(){
  const INTERVAL_MS = 6 * 60 * 60 * 1000; // 6 timer
  const lastRun = parseInt(localStorage.getItem('pf_live_auto_ts') || '0');
  const now = Date.now();
  if(now - lastRun > INTERVAL_MS){
    // Vent 3 sek efter appstart så UI er klar
    await new Promise(r => setTimeout(r, 3000));
    try{
      await loadTopLivePrices();
      localStorage.setItem('pf_live_auto_ts', String(Date.now()));
      console.log('[Auto] Live priser opdateret');
    } catch(e){ console.warn('[Auto] Live pris fejl:', e); }
  }
  // Gentag hver 6. time mens appen er åben
  setInterval(async () => {
    try{
      await loadTopLivePrices();
      localStorage.setItem('pf_live_auto_ts', String(Date.now()));
      console.log('[Auto] Live priser opdateret (interval)');
    } catch(e){ console.warn('[Auto] Live pris interval fejl:', e); }
  }, INTERVAL_MS);
})();
