<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f5f0;--surface:#fff;--surface2:#f0ede6;--surface3:#e8e4dc;
  --border:#ddd9d0;--text:#1e1c17;--muted:#7a7567;--faint:#b8b3a8;
  --primary:#b8860b;--primary-light:#f0c030;--primary-fg:#1a1200;
  --teal:#0c7a85;--green:#3a6b1e;--orange:#c25d00;--red:#b52a2a;--purple:#6b3fa0;--blue:#1d4ed8;
  --radius:.75rem;--radius-sm:.4rem;--radius-xs:.25rem;
  --shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.06);
  --shadow-lg:0 8px 40px rgba(0,0,0,.14);
  --trans:160ms cubic-bezier(.16,1,.3,1);
}
[data-theme="dark"]{
  --bg:#0d1117;--surface:#161b27;--surface2:#1c2235;--surface3:#222840;
  --border:#252d42;--text:#e2e8f0;--muted:#6b7a99;--faint:#3a4560;
  --primary:#e8b830;--primary-light:#f5d060;--primary-fg:#120e00;
  --teal:#38bdf8;--green:#6daa45;--orange:#fb923c;--red:#f87171;--purple:#a78bfa;--blue:#60a5fa;
  --shadow:0 1px 4px rgba(0,0,0,.2),0 4px 16px rgba(0,0,0,.3);
  --shadow-lg:0 8px 40px rgba(0,0,0,.55);
}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{font-family:'Satoshi',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;font-size:15px;line-height:1.5}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
input,select,textarea{font:inherit;color:inherit}

/* ── Header ── */
header{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border)}
.hdr{display:flex;align-items:center;gap:.6rem;height:3.25rem;max-width:1400px;margin:0 auto;padding:0 1rem}
.logo{display:flex;align-items:center;gap:.45rem;font-weight:700;font-size:.95rem;flex-shrink:0}
.search-wrap{flex:1;position:relative;max-width:320px}
.search-wrap input{width:100%;height:2.1rem;padding:0 2rem 0 2.1rem;border-radius:var(--radius);background:var(--surface2);border:1px solid var(--border);outline:none;font-size:.85rem;transition:border-color var(--trans)}
.search-wrap input:focus{border-color:var(--primary)}
.s-ico{position:absolute;left:.6rem;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.s-clr{position:absolute;right:.5rem;top:50%;transform:translateY(-50%);color:var(--muted);display:none}
.s-clr.show{display:flex}
.spacer{flex:1}
.btn-icon{width:2.1rem;height:2.1rem;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);color:var(--muted);transition:background var(--trans),color var(--trans)}
.btn-icon:hover{background:var(--surface2);color:var(--text)}
.btn-primary{display:inline-flex;align-items:center;gap:.35rem;padding:.4rem .85rem;border-radius:var(--radius);background:var(--primary);color:var(--primary-fg);font-weight:700;font-size:.82rem;flex-shrink:0;transition:opacity var(--trans)}
.btn-primary:hover{opacity:.85}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-trade{display:inline-flex;align-items:center;gap:.35rem;padding:.4rem .75rem;border-radius:var(--radius);background:var(--surface2);color:var(--text);font-weight:600;font-size:.82rem;flex-shrink:0;border:1px solid var(--border);transition:background var(--trans),border-color var(--trans)}
.btn-trade:hover{background:var(--surface3,#2a2a3a);border-color:var(--teal);color:var(--teal)}
.lbl{display:none}
@media(min-width:520px){.lbl{display:inline}}

/* ── API key banner ── */
.api-banner{background:color-mix(in srgb,var(--blue) 12%,var(--surface));border-bottom:1px solid color-mix(in srgb,var(--blue) 25%,var(--border));padding:.55rem 1rem}
.api-banner-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;font-size:.8rem}
.api-banner input{flex:1;min-width:200px;max-width:380px;padding:.35rem .65rem;border-radius:var(--radius-sm);border:1.5px solid color-mix(in srgb,var(--blue) 40%,var(--border));background:var(--surface);font-size:.82rem;outline:none;font-family:monospace}
.api-banner input:focus{border-color:var(--blue)}
.api-key-label{color:var(--blue);font-weight:700;white-space:nowrap}
.btn-save-key{padding:.3rem .75rem;border-radius:var(--radius-sm);background:var(--blue);color:#fff;font-weight:700;font-size:.78rem;transition:opacity var(--trans);flex-shrink:0}
.btn-save-key:hover{opacity:.85}
.key-status{font-size:.75rem;color:var(--muted)}
.key-status.ok{color:var(--green);font-weight:600}

/* ── Tabs ── */
.tabs{background:var(--bg);border-bottom:1px solid var(--border)}
.tabs-inner{max-width:1400px;margin:0 auto;padding:0 1rem;display:flex}
.tab{padding:.65rem 1.1rem;font-size:.85rem;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;transition:all var(--trans);white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}

/* ── Summary ── */
.summary{background:var(--surface);border-bottom:1px solid var(--border)}
.sum-inner{max-width:1400px;margin:0 auto;padding:.6rem 1rem;display:flex;flex-wrap:wrap;gap:.5rem 1.5rem;align-items:center}
.stat{display:flex;align-items:center;gap:.4rem;font-size:.8rem}
.stat-lbl{color:var(--muted)}
.stat-val{font-weight:700}
.stat-val.green{color:var(--green)}
.stat-val.red{color:var(--red)}
.stat-val.gold{color:var(--primary)}
.stat-val.blue{color:var(--blue)}
.sdiv{width:1px;height:1rem;background:var(--border)}

/* ── Toolbar ── */
.toolbar{max-width:1400px;margin:0 auto;padding:.6rem 1rem;display:flex;flex-wrap:wrap;gap:.5rem;align-items:center}
.chip{padding:.22rem .65rem;border-radius:999px;font-size:.75rem;font-weight:600;background:var(--surface2);color:var(--muted);border:1.5px solid transparent;cursor:pointer;transition:all var(--trans);white-space:nowrap}
.chip:hover{color:var(--text);border-color:var(--border)}
.chip.active{background:var(--primary);color:var(--primary-fg);border-color:var(--primary)}
.tb-sep{width:1px;height:1.1rem;background:var(--border);flex-shrink:0}
.sort-sel{padding:.22rem .6rem;border-radius:var(--radius-sm);background:var(--surface2);border:1px solid var(--border);font-size:.78rem;color:var(--muted);outline:none;cursor:pointer}

/* ── Batch analyse bar ── */
.analyse-bar{max-width:1400px;margin:0 auto;padding:.4rem 1rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.btn-analyse-all{display:inline-flex;align-items:center;gap:.4rem;padding:.38rem .9rem;border-radius:var(--radius);background:color-mix(in srgb,var(--purple) 18%,var(--surface2));color:var(--purple);font-weight:700;font-size:.8rem;border:1.5px solid color-mix(in srgb,var(--purple) 35%,var(--border));transition:all var(--trans)}
.btn-analyse-all:hover{background:color-mix(in srgb,var(--purple) 28%,var(--surface2))}
.btn-analyse-all:disabled{opacity:.45;cursor:not-allowed}
.analyse-progress{font-size:.77rem;color:var(--muted)}
.analyse-progress span{color:var(--purple);font-weight:700}

/* ── Table ── */
.table-wrap{max-width:1400px;margin:0 auto;padding:0 1rem 3rem;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.8rem;min-width:820px}
thead th{padding:.5rem .6rem;text-align:left;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);background:var(--surface);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;position:sticky;top:0;z-index:2}
thead th:hover{color:var(--text)}
thead th.sorted{color:var(--primary)}
.s-arr{margin-left:.25rem;opacity:.4}
thead th.sorted .s-arr{opacity:1}
tbody tr{border-bottom:1px solid var(--border);transition:background var(--trans)}
tbody tr:hover{background:var(--surface)}
tbody td{padding:.45rem .6rem;vertical-align:middle}
td.muted{color:var(--muted)}
td.num{text-align:right;font-variant-numeric:tabular-nums;font-weight:600}
td.num.green{color:var(--green)}
td.num.red{color:var(--red)}
td.num.gold{color:var(--primary)}
.name-cell{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}
.set-cell{max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pill{display:inline-flex;align-items:center;padding:.15rem .5rem;border-radius:999px;font-size:.7rem;font-weight:700;white-space:nowrap}
.pill-psa10{background:#1a4a8a20;color:#5b9cf6}
.pill-psa9{background:#16652020;color:var(--green)}
.pill-psa8{background:#c25d0020;color:var(--orange)}
.pill-bgs{background:#6b3fa020;color:var(--purple)}
.pill-bgs-black{background:linear-gradient(135deg,#1a1a1a,#2d2d2d);color:#ffd700;border:1px solid #ffd70060;font-weight:700}
.pill-cgc{background:#0c5a4020;color:#34d399}
.pill-tag{background:#7c3a1020;color:#fb923c}
.pill-cat{font-size:.68rem;padding:.1rem .4rem}
.pill-poke{background:#e8b83015;color:#c49a00}
.pill-op{background:#dc143c15;color:#e05a70}
.pill-mtg{background:#8b450015;color:#d4730a}
.pill-rb{background:#1a6b3015;color:#4caf70}
.btn-del{opacity:0;padding:.2rem .4rem;border-radius:.3rem;font-size:.72rem;color:var(--muted);transition:all var(--trans)}
tbody tr:hover .btn-del{opacity:1}
.btn-del:hover{background:#b52a2a20;color:var(--red)}

/* ── AI Score cell ── */
.ai-cell{min-width:160px}
.score-badge{display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .55rem;border-radius:.4rem;font-size:.78rem;font-weight:700;cursor:pointer;transition:all var(--trans)}
.score-badge:hover{opacity:.8}
.score-sell{background:#b52a2a22;color:var(--red);border:1px solid #b52a2a44}
.score-hold{background:#e8b83022;color:var(--primary);border:1px solid #e8b83044}
.score-grade{background:#0c7a8522;color:var(--teal);border:1px solid #0c7a8544}
.score-na{background:var(--surface2);color:var(--muted);border:1px solid var(--border);font-weight:500;font-size:.72rem}
.btn-analyse{display:inline-flex;align-items:center;gap:.25rem;padding:.18rem .5rem;border-radius:.35rem;font-size:.72rem;font-weight:600;background:color-mix(in srgb,var(--purple) 15%,var(--surface2));color:var(--purple);border:1px solid color-mix(in srgb,var(--purple) 30%,var(--border));transition:all var(--trans);white-space:nowrap}
.btn-analyse:hover{background:color-mix(in srgb,var(--purple) 25%,var(--surface2))}
.btn-analyse:disabled{opacity:.4;cursor:not-allowed}
.spin{display:inline-block;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── AI Detail panel (expandable row) ── */
.ai-detail-row td{padding:0!important;border-bottom:2px solid color-mix(in srgb,var(--purple) 30%,var(--border))}
.ai-detail-inner{padding:.75rem 1rem .85rem;background:color-mix(in srgb,var(--purple) 6%,var(--surface));border-left:3px solid var(--purple);display:block}
.ai-detail-inner.has-card-img{display:flex;gap:1rem;align-items:flex-start}
.card-thumb-wrap{flex-shrink:0;width:120px;cursor:pointer;transition:all var(--trans)}
.card-thumb-wrap.card-thumb-zoomed{width:220px;z-index:10}
.card-thumb-img{width:100%;border-radius:.5rem;box-shadow:0 4px 16px rgba(0,0,0,.4);transition:transform var(--trans)}
.card-thumb-img:hover{transform:scale(1.04)}
.ai-detail-main{flex:1;min-width:0}
/* Period filter buttons */
.period-filter-row{display:flex;gap:.3rem;flex-wrap:wrap;margin-bottom:.6rem}
.period-btn{padding:.2rem .55rem;border-radius:.35rem;font-size:.72rem;font-weight:700;color:var(--muted);background:var(--surface2);border:1px solid var(--border);cursor:pointer;transition:all var(--trans)}
.period-btn:hover{border-color:var(--primary);color:var(--primary)}
.period-btn.active{background:var(--primary);color:#000;border-color:var(--primary)}
/* Market Movers module */
.market-movers-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.mover-item{display:flex;align-items:center;gap:.5rem;padding:.4rem .6rem;background:var(--surface2);border-radius:.4rem;border:1px solid var(--border)}
.mover-item.up{border-left:3px solid var(--green)}
.mover-item.down{border-left:3px solid var(--red)}
.mover-name{flex:1;font-size:.75rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
.mover-price{font-size:.78rem;font-weight:700;color:var(--text)}
.mover-chg{font-size:.72rem;font-weight:700;min-width:52px;text-align:right}
.mover-chg.up{color:var(--green)}
.mover-chg.down{color:var(--red)}

/* ── Trade Analyzer ── */
.trade-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.trade-overlay.hidden{display:none}
.trade-box{background:var(--surface);border:1px solid var(--border);border-radius:.75rem;width:min(900px,95vw);max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.trade-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem .75rem;border-bottom:1px solid var(--border)}
.trade-title{font-size:1rem;font-weight:800;color:var(--text)}
.trade-body{display:grid;grid-template-columns:1fr auto 1fr;gap:0;padding:1.25rem}
.trade-col{padding:0 1rem}
.trade-divider{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem;padding:0 .5rem}
.trade-divider-line{width:1px;flex:1;background:var(--border)}
.trade-vs{background:var(--surface2);border:1px solid var(--border);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:800;color:var(--muted);flex-shrink:0}
.trade-select{width:100%;padding:.4rem .6rem;background:var(--surface2);border:1px solid var(--border);border-radius:.4rem;font-size:.82rem;color:var(--text);margin-bottom:.75rem}
.trade-card-name{font-size:.9rem;font-weight:800;color:var(--text);margin-bottom:.2rem}
.trade-card-meta{font-size:.72rem;color:var(--muted);margin-bottom:.75rem}
.trade-stat-row{display:flex;justify-content:space-between;align-items:center;padding:.3rem 0;border-bottom:1px solid var(--border)}
.trade-stat-row:last-child{border-bottom:none}
.trade-stat-label{font-size:.74rem;color:var(--muted)}
.trade-stat-val{font-size:.8rem;font-weight:700;color:var(--text)}
.trade-verdict{margin-top:.85rem;padding:.6rem .8rem;border-radius:.45rem;font-size:.82rem;font-weight:700;text-align:center}
.trade-verdict.favorable{background:color-mix(in srgb,var(--green) 12%,var(--surface));color:var(--green);border:1px solid color-mix(in srgb,var(--green) 30%,var(--border))}
.trade-verdict.unfavorable{background:color-mix(in srgb,var(--red) 12%,var(--surface));color:var(--red);border:1px solid color-mix(in srgb,var(--red) 30%,var(--border))}
.trade-verdict.neutral{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
@media(max-width:600px){.trade-body{grid-template-columns:1fr}.trade-divider{flex-direction:row;padding:.5rem 0}.trade-divider-line{width:100%;height:1px;flex:none}}


/* ── Prishistorik sparkline ── */
.price-history-panel{margin-top:.75rem;padding:.6rem .75rem;background:var(--surface);border:1px solid var(--border);border-radius:.5rem}
.price-history-title{font-size:.7rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem;display:flex;align-items:center;gap:.4rem}
.sparkline-wrap{position:relative;height:52px;width:100%}
.sparkline-labels{display:flex;justify-content:space-between;font-size:.62rem;color:var(--faint);margin-top:.2rem}
.sparkline-points{display:flex;align-items:flex-end;gap:3px;height:52px;width:100%}
.sparkline-bar{flex:1;border-radius:2px 2px 0 0;min-height:3px;transition:opacity .15s}
.sparkline-bar:hover{opacity:.75}
/* ── Price by Condition ── */
.pbc-panel{margin-top:.75rem;padding:.6rem .75rem;background:var(--surface);border:1px solid var(--border);border-radius:.5rem}
.pbc-title{font-size:.7rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem}
.pbc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.35rem}
.pbc-cell{background:var(--surface2);border:1px solid var(--border);border-radius:.4rem;padding:.4rem .5rem;text-align:center}
.pbc-cond{font-size:.65rem;font-weight:700;color:var(--muted);margin-bottom:.2rem;text-transform:uppercase}
.pbc-price{font-size:.82rem;font-weight:800;color:var(--text)}
.pbc-dkk{font-size:.6rem;color:var(--faint);margin-top:.1rem}
.pbc-cell.highlight{border-color:var(--primary);background:color-mix(in srgb,var(--primary) 8%,var(--surface2))}
.pbc-cell.highlight .pbc-cond{color:var(--primary)}

.ai-detail-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem}
.ai-detail-title{font-size:.8rem;font-weight:700;color:var(--purple)}
.ai-detail-close{color:var(--muted);padding:.1rem .3rem;border-radius:.25rem;font-size:.75rem;transition:all var(--trans)}
.ai-detail-close:hover{background:var(--surface3);color:var(--text)}
.ai-scores-row{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:.6rem}
.score-dim{display:flex;flex-direction:column;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:.5rem;padding:.4rem .6rem;min-width:90px;cursor:pointer;transition:all var(--trans);position:relative}
.score-dim:hover{border-color:var(--primary);box-shadow:0 0 0 2px color-mix(in srgb,var(--primary) 20%,transparent)}
.score-dim-label{font-size:.65rem;color:var(--muted);margin-bottom:.2rem;text-align:center;font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.score-dim-label::after{content:' ℹ️';font-size:.6rem;opacity:.5}
.score-dim-val{font-size:1.1rem;font-weight:800}
.score-dim-val.grade{color:var(--teal)}
.score-dim-val.high{color:var(--green)}
.score-dim-val.mid{color:var(--orange)}
.score-dim-val.low{color:var(--red)}
/* Dim expand panel */
.dim-expand{display:none;position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);min-width:240px;max-width:320px;background:var(--surface);border:1.5px solid var(--primary);border-radius:var(--radius);padding:.75rem .9rem;z-index:20;box-shadow:var(--shadow-lg);font-size:.78rem;line-height:1.6;color:var(--text);text-align:left;white-space:normal}
.dim-expand.open{display:block}
.dim-expand-title{font-size:.7rem;font-weight:800;color:var(--primary);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.35rem}
.dim-expand::before{content:'';position:absolute;top:-7px;left:50%;transform:translateX(-50%);width:12px;height:12px;background:var(--surface);border-left:1.5px solid var(--primary);border-top:1.5px solid var(--primary);transform:translateX(-50%) rotate(45deg)}
/* Lang switcher */
.lang-sel{padding:.22rem .55rem;border-radius:var(--radius-sm);background:var(--surface2);border:1px solid var(--border);font-size:.78rem;color:var(--muted);outline:none;cursor:pointer}
.ai-reasoning{font-size:.82rem;line-height:1.65;color:var(--text)}
.ai-sources{margin-top:.5rem;font-size:.72rem;color:var(--muted);font-style:italic}
.ai-timestamp{font-size:.68rem;color:var(--faint);margin-top:.25rem}
.ai-rec-chip{display:inline-flex;align-items:center;gap:.3rem;padding:.25rem .65rem;border-radius:999px;font-size:.8rem;font-weight:800;margin-bottom:.5rem}
.ai-rec-sell{background:#b52a2a22;color:var(--red);border:1.5px solid #b52a2a55}
.ai-rec-hold{background:#e8b83022;color:var(--primary);border:1.5px solid #e8b83055}
.ai-rec-grade{background:#0c7a8522;color:var(--teal);border:1.5px solid #0c7a8555}

/* ── Modal ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px)}
.modal-backdrop.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:28rem;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.1rem .75rem;border-bottom:1px solid var(--border)}
.modal-title{font-size:.95rem;font-weight:700}
.modal-close{width:1.65rem;height:1.65rem;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:background var(--trans)}
.modal-close:hover{background:var(--surface2)}
.modal-body{padding:1rem}
.fg{display:flex;flex-direction:column;gap:.25rem;margin-bottom:.65rem}
.fg label{font-size:.73rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
.fg input,.fg select,.fg textarea{padding:.4rem .6rem;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface2);font-size:.85rem;outline:none;transition:border-color var(--trans);width:100%}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--primary)}
.fg textarea{resize:vertical;min-height:3rem}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.form-actions{display:flex;gap:.45rem;margin-top:.75rem}
.btn-sub{flex:1;padding:.5rem 1rem;border-radius:var(--radius);background:var(--primary);color:var(--primary-fg);font-weight:700;font-size:.88rem;transition:opacity var(--trans)}
.btn-sub:hover{opacity:.85}
.btn-can{padding:.5rem .9rem;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface2);color:var(--muted);font-size:.88rem}
.btn-can:hover{color:var(--text)}

/* ── Empty ── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 1rem;gap:.75rem;color:var(--muted);text-align:center}
.empty-state svg{opacity:.2}
.empty-title{font-size:.95rem;font-weight:700;color:var(--text)}

/* ── Toast ── */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:200;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.65rem 1rem;font-size:.82rem;font-weight:600;box-shadow:var(--shadow-lg);transform:translateY(2rem);opacity:0;transition:all .25s ease;pointer-events:none;max-width:340px}
.toast.show{transform:translateY(0);opacity:1}

@media(max-width:640px){
  .hide-mob{display:none!important}
  .name-cell{max-width:110px}
  table{min-width:600px}
}

/* ── Dashboard ── */
/* ═══ DASHBOARD — fuld bredde, ingen sidemargener ═══ */
.dash{display:none;width:100%;padding:.75rem 1rem 3rem;box-sizing:border-box;overflow-x:hidden}
.dash.visible{display:block}
.dash-section{margin-bottom:1.25rem}
.dash-section-title{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:.75rem;display:flex;align-items:center;gap:.5rem}
.dash-section-title::after{content:'';flex:1;height:1px;background:var(--border)}
/* KPI-række: alle KPIs i én række, ligefordelt */
.kpi-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:.5rem;margin-bottom:1rem}
@media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:640px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.75rem .85rem;position:relative;overflow:hidden;transition:box-shadow var(--trans)}
.kpi:hover{box-shadow:var(--shadow)}
.kpi-accent{position:absolute;top:0;left:0;width:3px;height:100%;border-radius:var(--radius) 0 0 var(--radius)}
.kpi-label{font-size:.62rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.3rem}
.kpi-value{font-size:1.1rem;font-weight:800;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kpi-sub{font-size:.65rem;color:var(--muted);margin-top:.15rem}
.kpi-value.green{color:var(--green)}
.kpi-value.red{color:var(--red)}
.kpi-value.gold{color:var(--primary)}
.kpi-value.blue{color:var(--blue)}
.kpi-value.teal{color:var(--teal)}
/* Charts */
.charts-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.75rem;margin-bottom:.25rem;overflow:hidden;min-width:0}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.75rem .85rem;min-width:0;max-width:100%;display:flex;flex-direction:column;overflow:hidden}
.chart-title{font-size:.75rem;font-weight:700;color:var(--text);margin-bottom:.65rem}
.chart-wrap{position:relative;flex:1;min-height:100px;height:200px}
.chart-wrap-sm{position:relative;flex:1;min-height:80px;height:170px}
/* Når module-body har explicit height sat (resize), skalér charts med den */
.module-body.resizing-active .chart-wrap,
.module-body[style*="height"] .chart-wrap{height:100%;min-height:60px}
.module-body.resizing-active .chart-wrap-sm,
.module-body[style*="height"] .chart-wrap-sm{height:100%;min-height:60px}
/* Tabeller */
.dash-table{width:100%;border-collapse:collapse;font-size:.78rem}
.dash-table th{padding:.35rem .55rem;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);border-bottom:1px solid var(--border);text-align:left}
.dash-table td{padding:.35rem .55rem;border-bottom:1px solid color-mix(in srgb,var(--border) 50%,transparent);vertical-align:middle}
.dash-table tr:last-child td{border-bottom:none}
.dash-table td.num{text-align:right;font-variant-numeric:tabular-nums;font-weight:600}
.dash-table td.green{color:var(--green)}
.dash-table td.red{color:var(--red)}
.dash-table td.gold{color:var(--primary)}
/* 2-kolonner tabel (Top Performers) — fuld bredde, ingen afskæring */
.dash-two{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.5rem;min-width:0}
.dash-two .chart-card{min-width:0;overflow:hidden}
.dash-two .dash-table{table-layout:fixed;width:100%}
.dash-two .dash-table td:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:0}
@media(max-width:700px){.dash-two{grid-template-columns:1fr}}
.insight-list{display:flex;flex-direction:column;gap:.45rem}
.insight-item{display:flex;align-items:flex-start;gap:.6rem;padding:.55rem .75rem;border-radius:var(--radius-sm);background:var(--surface2);font-size:.8rem;border-left:3px solid var(--border)}
.insight-item.warn{border-left-color:var(--orange)}
.insight-item.danger{border-left-color:var(--red)}
.insight-item.good{border-left-color:var(--green)}
.insight-item.info{border-left-color:var(--blue)}
.insight-item.teal{border-left-color:var(--teal)}
.insight-ico{font-size:1rem;flex-shrink:0;margin-top:.05rem}
.score-bar-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.35rem;font-size:.75rem}
.score-bar-label{width:60px;color:var(--muted);flex-shrink:0}
.score-bar-track{flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:4px;transition:width .5s ease}
.score-bar-count{width:28px;text-align:right;font-weight:700;color:var(--text);flex-shrink:0}
/* ═══ MODULERBART GRID DASHBOARD ═══ */
/* 2D CSS Grid — moduler kan spanne 1 eller 2 kolonner */
#dashModules{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:.75rem;
  align-items:start;
  width:100%;
  min-width:0;
  overflow:hidden;
}
/* Moduler der spanner fuld bredde */
.dash-module[data-span="2"]{ grid-column:span 2 }
/* Alle andre: 1 kolonne */
.dash-module{ grid-column:span 1 }
/* Specifikke moduler der skal være fuld bredde som standard */
.dash-module[data-module-id="kpis"],
.dash-module[data-module-id="grading-cands"],
.dash-module[data-module-id="concentration"]{ grid-column:span 2 }

.dash-module{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:visible;
  transition:box-shadow var(--trans),opacity .2s;
  position:relative;
  min-height:80px;
  min-width:0;
  max-width:100%;
}
.dash-module.dragging{opacity:.35;box-shadow:var(--shadow-lg);transform:rotate(.5deg)}
.dash-module.drag-over{border-color:var(--primary);box-shadow:0 0 0 2px color-mix(in srgb,var(--primary) 30%,transparent)}
/* Header */
.module-header{
  display:flex;align-items:center;gap:.5rem;
  padding:.5rem .8rem;
  background:var(--surface2);
  border-bottom:1px solid var(--border);
  cursor:grab;user-select:none;
  border-radius:var(--radius) var(--radius) 0 0;
}
.module-header:active{cursor:grabbing}
.module-drag-handle{color:var(--faint);font-size:.85rem;flex-shrink:0;opacity:.6}
.module-title{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);flex:1}
.module-toggle{width:1.5rem;height:1.5rem;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-xs);color:var(--muted);transition:all var(--trans);flex-shrink:0;font-size:.8rem}
.module-toggle:hover{background:var(--surface3);color:var(--text)}
/* Body */
.module-body{padding:.85rem 1rem;overflow-x:hidden;min-width:0}
.module-body.collapsed{display:none}
/* Resize håndtag — hjørne (nw-resize = diagonal begge retninger) */
.module-resize{
  position:absolute;bottom:0;right:0;
  width:18px;height:18px;
  cursor:nwse-resize;
  border-radius:0 0 var(--radius) 0;
  z-index:10;
  display:flex;align-items:flex-end;justify-content:flex-end;
  padding:2px 3px;
  opacity:0;
  transition:opacity .15s;
}
.dash-module:hover .module-resize,.module-resize.resizing{opacity:1}
.module-resize svg{pointer-events:none;color:var(--primary);opacity:.8}
/* Resizable body overflow */
.module-body.resizing-active{overflow:hidden}
/* Mobile: én kolonne */
@media(max-width:800px){
  #dashModules{grid-template-columns:1fr}
  .dash-module[data-span="2"],.dash-module[data-module-id="kpis"],.dash-module[data-module-id="grading-cands"],.dash-module[data-module-id="concentration"]{grid-column:span 1}
}

/* ── PSA potentiale badges ── */
.psa-pot{display:flex;gap:.3rem;flex-wrap:wrap}
.psa-badge{display:inline-flex;flex-direction:column;align-items:center;padding:.2rem .45rem;border-radius:.35rem;font-size:.65rem;font-weight:700;min-width:52px;text-align:center}
.psa-badge .psa-grade{font-size:.6rem;opacity:.75;margin-bottom:.1rem}
.psa-badge .psa-val{font-size:.72rem}
.psa8{background:color-mix(in srgb,var(--blue) 15%,transparent);color:var(--blue)}
.psa9{background:color-mix(in srgb,var(--green) 15%,transparent);color:var(--green)}
.psa10{background:color-mix(in srgb,var(--teal) 18%,transparent);color:var(--teal)}
.psa-na{background:var(--surface2);color:var(--faint);font-size:.65rem;padding:.2rem .4rem;border-radius:.3rem}

.rec-badge{display:inline-flex;align-items:center;gap:.25rem;padding:.15rem .5rem;border-radius:999px;font-size:.7rem;font-weight:700}
.rec-sell{background:#b52a2a20;color:var(--red)}
.rec-hold{background:#e8b83020;color:var(--primary)}
.rec-grade{background:#0c7a8520;color:var(--teal)}
.progress-ring-wrap{display:flex;align-items:center;justify-content:center;gap:1.5rem;flex-wrap:wrap;padding:.5rem 0}
.progress-ring-item{display:flex;flex-direction:column;align-items:center;gap:.35rem}
.progress-ring-label{font-size:.72rem;color:var(--muted);font-weight:600;text-align:center}

/* ── Live markedspris integration ── */
.live-price-badge{display:inline-flex;align-items:center;gap:.3rem;padding:.15rem .5rem;border-radius:.35rem;font-size:.72rem;font-weight:700;background:color-mix(in srgb,var(--teal) 12%,var(--surface2));color:var(--teal);border:1px solid color-mix(in srgb,var(--teal) 30%,var(--border));cursor:default;transition:all var(--trans);white-space:nowrap}
.live-price-badge.loading{opacity:.6;animation:pulse-badge 1.2s ease-in-out infinite}
.live-price-badge.error{background:color-mix(in srgb,var(--red) 10%,var(--surface2));color:var(--muted);border-color:color-mix(in srgb,var(--red) 20%,var(--border))}
@keyframes pulse-badge{0%,100%{opacity:.6}50%{opacity:1}}
.btn-live{display:inline-flex;align-items:center;gap:.25rem;padding:.18rem .5rem;border-radius:.35rem;font-size:.72rem;font-weight:600;background:color-mix(in srgb,var(--teal) 12%,var(--surface2));color:var(--teal);border:1px solid color-mix(in srgb,var(--teal) 28%,var(--border));transition:all var(--trans);white-space:nowrap}
.btn-live:hover{background:color-mix(in srgb,var(--teal) 22%,var(--surface2))}
.btn-live:disabled{opacity:.4;cursor:not-allowed}
/* EU Price panel i AI detail row */
.eu-price-panel{margin-top:.65rem;padding:.6rem .75rem;background:var(--surface2);border-radius:var(--radius-sm);border:1px solid var(--border)}
.eu-price-title{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--teal);margin-bottom:.45rem;display:flex;align-items:center;gap:.4rem}
.eu-price-grid{display:flex;flex-wrap:wrap;gap:.4rem}
.eu-price-item{display:flex;flex-direction:column;align-items:center;padding:.3rem .55rem;background:var(--surface);border:1px solid var(--border);border-radius:.4rem;min-width:68px;text-align:center}
.eu-price-flag{font-size:.9rem;line-height:1}
.eu-price-country{font-size:.6rem;color:var(--muted);font-weight:700;margin:.05rem 0}
.eu-price-val{font-size:.75rem;font-weight:800;color:var(--text)}
.eu-price-trend{font-size:.62rem;margin-top:.05rem}
.eu-price-trend.up{color:var(--green)}
.eu-price-trend.down{color:var(--red)}
.eu-price-trend.flat{color:var(--muted)}
/* Cardmarket source badge */
.cm-source{font-size:.65rem;color:var(--muted);margin-top:.35rem;display:flex;align-items:center;gap:.3rem}
.cm-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);flex-shrink:0}
/* Live pris kolonne i tabel */
.live-col{min-width:120px}
/* API status banner for live data */
.live-api-banner{display:flex;align-items:center;gap:.55rem;padding:.3rem .75rem;border-radius:var(--radius-sm);background:color-mix(in srgb,var(--teal) 8%,var(--surface2));border:1px solid color-mix(in srgb,var(--teal) 20%,var(--border));font-size:.73rem;color:var(--muted)}
.live-api-banner .dot-live{width:6px;height:6px;border-radius:50%;background:var(--teal);animation:blink-live 2s ease-in-out infinite;flex-shrink:0}
@keyframes blink-live{0%,100%{opacity:1}50%{opacity:.3}}
/* Dashboard live priser modul */
.live-status-row{display:flex;align-items:center;justify-content:space-between;padding:.45rem 0;border-bottom:1px solid color-mix(in srgb,var(--border) 50%,transparent);font-size:.8rem;gap:.5rem}
.live-status-row:last-child{border-bottom:none}
.live-status-name{flex:1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
.live-status-price{font-variant-numeric:tabular-nums;font-weight:700;color:var(--teal)}
.live-status-change{font-size:.72rem;font-weight:700}
.live-status-change.up{color:var(--green)}
.live-status-change.down{color:var(--red)}

/* ── Auth Modal ── */
.auth-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.auth-overlay.hidden{display:none}
.auth-box{background:var(--surface);border:1px solid var(--border);border-radius:.75rem;padding:2rem 2.25rem;width:100%;max-width:380px;box-shadow:var(--shadow-lg)}
.auth-logo{display:flex;align-items:center;gap:.6rem;margin-bottom:1.25rem;justify-content:center}

.auth-tab{flex:1;padding:.4rem;border-radius:.3rem;font-size:.83rem;font-weight:700;color:var(--muted);text-align:center;cursor:pointer;transition:all var(--trans)}

.auth-field{margin-bottom:.9rem}

.auth-err{font-size:.78rem;color:var(--red);margin-top:.5rem;min-height:1.2em;text-align:center}
.auth-or{text-align:center;font-size:.75rem;color:var(--faint);margin:.75rem 0}
.user-chip{display:flex;align-items:center;gap:.4rem;padding:.2rem .55rem;background:var(--surface2);border:1px solid var(--border);border-radius:999px;font-size:.76rem;color:var(--muted);cursor:pointer;transition:all var(--trans)}

// ── TCGdex: hent kortdata + Cardmarket EU priser ──
async function fetchTCGdex(item){
  // TCGdex: list-endpoint returnerer kun id/name/image.
  // Vi skal hente enkelt-kort via GET /v2/en/cards/{id} for at få pricing.cardmarket
  const rawName = (item.productName||'').replace(/\s+PSA.*$/i,'').replace(/\s*\(JP\)\s*/i,'').trim();
  const name = encodeURIComponent(rawName);
  const BASE = 'https://api.tcgdex.net/v2/en';

  // Hjælper: hent fuldt kort, udtræk cardmarket pricing + auto-raritet
  async function getFullCard(cardId){
    const r = await fetch(`${BASE}/cards/${cardId}`);
    if(!r.ok) return null;
    const d = await r.json();
    const cm = d.pricing?.cardmarket || d.markets?.cardmarket || null;
    if(!cm) return null;
    // Auto-raritet: opdater item i alle data-arrays hvis det ikke allerede er sat korrekt
    const tcgRarity = d.rarity || null;
    if(tcgRarity && (!item.rarity || item.rarity.toLowerCase()==='common' || item.rarity.toLowerCase()==='unknown' || item.rarity === '')){
      item.rarity = tcgRarity;
      // Gem tilbage i rætt array
      const arr = gradedData.find(i=>i.id===item.id) ? gradedData
                : sealedData.find(i=>i.id===item.id) ? sealedData
                : rawData;
      const idx = arr.findIndex(i=>i.id===item.id);
      if(idx>=0){ arr[idx].rarity = tcgRarity; saveAll(); }
    }
    return { id: d.id, name: d.name, cm, set: d.set?.name, rarity: tcgRarity, image: d.image || null };
  }

  // Hjælper: hent første hit med pris fra en liste (parallelt for hastighed)
  async function firstWithPrice(list, max=4){
    const results = await Promise.allSettled(list.slice(0,max).map(c=>getFullCard(c.id)));
    for(const r of results){
      if(r.status==='fulfilled' && r.value) return r.value;
    }
    return null;
  }

  try{
    // 1) Søg med kortnummer hvis tilgængeligt
    if(item.cardNumber){
      const r1 = await fetch(`${BASE}/cards?name=${name}&localId=${encodeURIComponent(item.cardNumber)}`,{signal:AbortSignal.timeout(6000)});
      if(r1.ok){
        const list = await r1.json();
        if(Array.isArray(list) && list.length > 0){
          const full = await getFullCard(list[0].id);
          if(full) return full;
        }
      }
    }
    // 2) Søg på navn — hent første 4 parallelt
    const r2 = await fetch(`${BASE}/cards?name=${name}`,{signal:AbortSignal.timeout(6000)});
    if(r2.ok){
      const list2 = await r2.json();
      if(Array.isArray(list2) && list2.length > 0){
        const full = await firstWithPrice(list2, 4);
        if(full) return full;
      }
    }
    // 3) Kortere navn som fallback (kun hvis navn er 3+ ord)
    const words = rawName.split(' ');
    if(words.length >= 3){
      const shortName = encodeURIComponent(words.slice(0,2).join(' '));
      const r3 = await fetch(`${BASE}/cards?name=${shortName}`,{signal:AbortSignal.timeout(6000)});
      if(r3.ok){
        const list3 = await r3.json();
        if(Array.isArray(list3) && list3.length > 0){
          const full = await firstWithPrice(list3, 3);
          if(full) return full;
        }
      }
    }
  } catch(e){ console.warn('TCGdex fejl:', e.name==='TimeoutError'?'timeout':e); }
  return null;
}

// ── cardmarket-api.com: EU land-specifikke priser (gratis tier: 100 req/dag) ──
const CM_API_KEY = localStorage.getItem('pf_cmapi_key') || '';
async function fetchCardmarketAPI(item){
  if(!CM_API_KEY) return null; // kræver nøgle
  const name = encodeURIComponent((item.productName||'').replace(/\s+PSA.*$/i,'').trim());
  try{
    const res = await fetch(`https://www.cardmarket-api.com/pokemon/cards?search=${name}`,{
      headers: { 'x-rapidapi-key': CM_API_KEY, 'x-rapidapi-host': 'cardmarket-api.com' }
    });
    if(res.ok){
      const d = await res.json();
      const cards = d.data || d.cards || d;
      if(Array.isArray(cards) && cards.length > 0) return cards[0];
    }
  } catch(e){ console.warn('CM API fejl:', e); }
  return null;
}

// ── Hoved-funktion: hent live priser for et item ──
async function fetchLivePrice(item){
  const cid = item.id;
  const cached = liveCache[cid];
  if(cached && (Date.now()-cached.fetchedAt < LIVE_TTL)) return cached;

  const [tcgdex, cmapi] = await Promise.allSettled([
    fetchTCGdex(item),
    fetchCardmarketAPI(item),
  ]);

  const result = {
    fetchedAt: Date.now(),
    tcgdex: tcgdex.status==='fulfilled' ? tcgdex.value : null,
    cmapi:  cmapi.status==='fulfilled'  ? cmapi.value  : null,
  };
  liveCache[cid] = result;
  saveLiveCache();
  // Optag prishistorik snapshot
  const _snapPrice = result.tcgdex?.cm?.averageSellPrice || result.tcgdex?.cm?.avg1;
  if(_snapPrice) recordPriceSnapshot(cid, _snapPrice);
  return result;
}

// ── Load og re-render EU panel for specifikt item ──
async function loadLivePricePanel(itemId){
  const allItems = [...gradedData, ...sealedData, ...rawData];
  const item = allItems.find(i=>i.id===itemId);
  if(!item) return;

  // Invalider cache for dette item
  delete liveCache[itemId];
  saveLiveCache();

  // Vis loading i panelet
  const panel = document.querySelector(`.eu-panel-${itemId}`);
  if(panel) panel.innerHTML = `<div class="eu-price-panel"><div class="eu-price-title"><span class="cm-dot" style="animation:blink-live 1s infinite"></span> Henter Cardmarket pris...</div></div>`;

  await fetchLivePrice(item);

  // Re-render hele detail row
  const detailRow = document.getElementById('ai-detail-'+itemId);
  if(detailRow){
    const td = detailRow.querySelector('td');
    const inner = td?.querySelector('.ai-detail-inner');
    if(inner){
      const euPanel = inner.querySelector('.eu-panel-wrap');
      if(euPanel) euPanel.innerHTML = renderEUPricePanel(item);
    }

  showToast('✅ Live pris hentet: '+item.productName.substring(0,30));

// ── FEATURE 1: Periode-filter til Kapitalforbrug-chart ──
window._monthlyPeriod = window._monthlyPeriod || 'MAX';
function setMonthlyPeriod(period, btn){
  window._monthlyPeriod = period;
  // Opdater aktiv knap
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  // Gen-render kun monthly chart uden at genopbygge hele dashboardet
  const all = [...gradedData, ...sealedData, ...rawData];
  const monthly = {};
  all.forEach(i=>{
    if(!i.dateAdded) return;
    const d=new Date(i.dateAdded), k=d.getFullYear()+'-'+(''+(d.getMonth()+1)).padStart(2,'0');
    monthly[k]=(monthly[k]||0)+totC(i);
  });
  const allKeys = Object.keys(monthly).sort();
  function _filterMK(keys, p){
    if(p==='MAX') return keys;
    const cutMap={'1M':1,'3M':3,'6M':6,'1Y':12};
    const months=cutMap[p]||12;
    const now=new Date();
    const cutoff=new Date(now.getFullYear(),now.getMonth()-months+1,1);
    const cutStr=cutoff.getFullYear()+'-'+(''+(cutoff.getMonth()+1)).padStart(2,'0');
    return keys.filter(k=>k>=cutStr);
  }
  const filteredKeys = _filterMK(allKeys, period);
  if(!filteredKeys.length) return;
  const cs=getComputedStyle(document.documentElement);
  const clrGold=cs.getPropertyValue('--primary').trim()||'#e8b830';
  const clrMuted=cs.getPropertyValue('--muted').trim()||'#6b7a99';
  const clrBorder=cs.getPropertyValue('--border').trim()||'#252d42';
  if(window.dashCharts && dashCharts.monthly){
    dashCharts.monthly.data.labels = filteredKeys.map(m=>{
      const [y,mo]=m.split('-');
      return new Date(y,mo-1).toLocaleDateString('da-DK',{month:'short',year:'2-digit'});
    });
    dashCharts.monthly.data.datasets[0].data = filteredKeys.map(m=>monthly[m]||0);
    dashCharts.monthly.update();
  }
}

// Lokal cache: { [itemId]: [{price, ts}] }  — max 90 punkter per kort
let priceHistory = JSON.parse(localStorage.getItem('pf_price_history') || '{}');

function savePriceHistory(){
  localStorage.setItem('pf_price_history', JSON.stringify(priceHistory));
}

// Gem snapshot i lokal cache + Supabase
async function recordPriceSnapshot(itemId, price){
  if(!price || price <= 0) return;
  const snap = { price: parseFloat(price.toFixed(2)), ts: Date.now() };
  if(!priceHistory[itemId]) priceHistory[itemId] = [];
  // Undgå duplikater inden for samme time
  const lastSnap = priceHistory[itemId].slice(-1)[0];
  const oneHour = 60*60*1000;
  if(lastSnap && (snap.ts - lastSnap.ts) < oneHour) return; // for nyligt
  priceHistory[itemId].push(snap);
  if(priceHistory[itemId].length > 90) priceHistory[itemId] = priceHistory[itemId].slice(-90);
  savePriceHistory();
  // Cloud sync
  if(supaUser){
    supa.from('price_history').upsert({
      item_id: itemId,
      user_id: supaUser.id,
      snapshots: priceHistory[itemId],
    }, { onConflict: 'item_id,user_id' }).then(({error}) => {
      if(error) console.warn('price_history upsert fejl:', error.message);
    });
  }
}

// Load prishistorik fra Supabase ved login
async function loadPriceHistoryFromSupabase(){
  if(!supaUser) return;
  const { data, error } = await supa.from('price_history').select('item_id,snapshots').eq('user_id', supaUser.id);
  if(error){ console.warn('price_history load fejl:', error.message); return; }
  data.forEach(r => {
    if(r.snapshots?.length) priceHistory[r.item_id] = r.snapshots;
  });
  savePriceHistory();
}

// SVG sparkline renderer
function renderPriceHistorySVG(itemId){
  const snaps = priceHistory[itemId];
  // Kombiner med live-cache data-punkter hvis få historiske punkter
  const liveCm = liveCache[itemId]?.tcgdex?.cm;
  let points = snaps ? [...snaps] : [];
  // Tilføj statiske CM-punkter som baggrundskontekst hvis < 3 rigtige snapshots
  if(points.length < 3 && liveCm){
    const now = Date.now();
    const syntheticPoints = [
      liveCm.avg30 ? { price: liveCm.avg30, ts: now - 30*24*60*60*1000, synthetic: true } : null,
      liveCm.avg7  ? { price: liveCm.avg7,  ts: now - 7*24*60*60*1000,  synthetic: true } : null,
      liveCm.avg1  ? { price: liveCm.avg1,  ts: now - 1*24*60*60*1000,  synthetic: true } : null,
      (liveCm.averageSellPrice||liveCm.avg1) ? { price: liveCm.averageSellPrice||liveCm.avg1, ts: now, synthetic: false } : null,
    ].filter(Boolean);
    // Flet syntetiske ind med rigtige (rigtige har prioritet)
    const merged = [...syntheticPoints];
    points.forEach(p => {
      // Fjern syntetisk punkt tættest på dette rigtige punkt
      const closest = merged.reduce((best, m, i) => Math.abs(m.ts-p.ts) < Math.abs((merged[best]||{ts:Infinity}).ts-p.ts) ? i : best, 0);
      if(merged[closest]?.synthetic) merged.splice(closest,1);
      merged.push(p);
    });
    points = merged.sort((a,b) => a.ts-b.ts);
  }
  if(points.length < 2) return '';

  const prices = points.map(p=>p.price);
  const minP = Math.min(...prices);
  const maxP = Math.max(...prices);
  const range = maxP - minP || 1;
  const W=260, H=52, PAD=4;

  // Byg SVG polyline
  const coords = points.map((p,i) => {
    const x = PAD + (i/(points.length-1)) * (W-PAD*2);
    const y = H - PAD - ((p.price-minP)/range) * (H-PAD*2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });

  // Farve baseret på trend
  const first = prices[0], last = prices[prices.length-1];
  const trendUp = last >= first;
  const lineColor = trendUp ? 'var(--green)' : 'var(--red)';
  const fillColor = trendUp ? '#6daa4522' : '#f8717122';

  // Gradient fill under linjen
  const areaCoords = coords.join(' ') + ` ${(W-PAD).toFixed(1)},${H} ${PAD},${H}`;

  const pctChg = first > 0 ? ((last-first)/first*100) : 0;
  const chgStr = (pctChg>=0?'+':'')+pctChg.toFixed(1)+'%';
  const chgColor = trendUp ? 'var(--green)' : 'var(--red)';

  // Tooltip datapunkter
  const dotHtml = points.map((p,i) => {
    const x = PAD + (i/(points.length-1)) * (W-PAD*2);
    const y = H - PAD - ((p.price-minP)/range) * (H-PAD*2);
    const dt = new Date(p.ts).toLocaleDateString('da-DK',{day:'numeric',month:'short'});
    const synLabel = p.synthetic ? ' (historisk avg)' : '';
    return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3" fill="${lineColor}" opacity="0.7">
      <title>${dt}${synLabel}: €${p.price.toFixed(2)}</title>
    </circle>`;

function getTradeItemData(item){
  const val = totV(item);
  const cost = totC(item);
  const pl = val - cost;
  const plPct_ = cost > 0 ? (pl/cost*100) : 0;
  const ai = aiCache[item.id];
  const live = liveCache[item.id]?.tcgdex?.cm;
  const liveAvg = live ? (live.averageSellPrice||live.avg1) : null;
  const mults = getPSAMultipliers(item.condition);
  const psa10est = mults?.psa10 ? fmtDKK(val * mults.psa10) : null;
  const psa9est  = mults?.psa9  ? fmtDKK(val * mults.psa9)  : null;

  let rows = `
    <div class="trade-stat-row"><span class="trade-stat-label">Markedsværdi</span><span class="trade-stat-val gold">${fmtDKK(val)}</span></div>
    <div class="trade-stat-row"><span class="trade-stat-label">Kostpris</span><span class="trade-stat-val">${fmtDKK(cost)}</span></div>
    <div class="trade-stat-row"><span class="trade-stat-label">P/L</span><span class="trade-stat-val ${pl>=0?'green':'red'}">${fmtDKK(pl)} (${plPct_.toFixed(1)}%)</span></div>
    ${liveAvg ? `<div class="trade-stat-row"><span class="trade-stat-label">CM Live avg</span><span class="trade-stat-val teal">€${liveAvg.toFixed(2)}</span></div>` : ''}
    ${psa9est  ? `<div class="trade-stat-row"><span class="trade-stat-label">PSA 9 potentiale</span><span class="trade-stat-val" style="color:var(--green)">${psa9est}</span></div>` : ''}
    ${psa10est ? `<div class="trade-stat-row"><span class="trade-stat-label">PSA 10 potentiale</span><span class="trade-stat-val teal">${psa10est}</span></div>` : ''}
    ${ai ? `<div class="trade-stat-row"><span class="trade-stat-label">AI Score</span><span class="trade-stat-val"><span class="score-badge score-${scoreColor(ai.overall_score)}" style="cursor:default">${ai.overall_score}/10</span></span></div>` : ''}
    ${ai ? `<div class="trade-stat-row"><span class="trade-stat-label">AI anbefaling</span><span class="trade-stat-val">${ai.recommendation||'—'}</span></div>` : ''}

function updateTradeCol(col){

function renderTradeVerdict(){
  const idA = document.getElementById('tradeSelA').value;
  const idB = document.getElementById('tradeSelB').value;
  const verdictEl = document.getElementById('tradeVerdict');
  if(!idA||!idB){ verdictEl.innerHTML=''; return; }
  const all = [...gradedData,...sealedData,...rawData];
  const itemA = all.find(i=>i.id===idA);
  const itemB = all.find(i=>i.id===idB);
  if(!itemA||!itemB) return;
  const dA = getTradeItemData(itemA);
  const dB = getTradeItemData(itemB);
  const diff = dB.val - dA.val;
  const diffPct = dA.val > 0 ? (diff/dA.val*100) : 0;

  let cls, txt, icon;
  if(diff > dA.val * 0.05){
    cls='favorable'; icon='✅';
    txt=`Fordelagtigt trade — du modtager ${fmtDKK(dB.val)} for ${fmtDKK(dA.val)} (${diffPct>=0?'+':''}${diffPct.toFixed(1)}%). Du tjener ${fmtDKK(Math.abs(diff))} på handlen.`;
  } else if(diff < -dA.val * 0.05){
    cls='unfavorable'; icon='⚠️';
    txt=`Ufordelagtigt trade — du giver ${fmtDKK(dA.val)} for ${fmtDKK(dB.val)} (${diffPct.toFixed(1)}%). Du taber ${fmtDKK(Math.abs(diff))} på handlen.`;
  } else {
    cls='neutral'; icon='⚖️';
    txt=`Jævnt trade — næsten samme markedsværdi (forskel: ${fmtDKK(Math.abs(diff))}, ${Math.abs(diffPct).toFixed(1)}%).`;
  }

  // AI-faktor
  const aiA = dA.ai?.overall_score||0, aiB = dB.ai?.overall_score||0;
  let aiFactor = '';
  if(aiA && aiB){
    if(aiB > aiA+1) aiFactor = ` AI-score taler for handlen: modtaget kort scorer ${aiB}/10 vs. ${aiA}/10.`;
    else if(aiA > aiB+1) aiFactor = ` AI-score taler imod: dit kort scorer ${aiA}/10 vs. ${aiB}/10.`;
  }

  verdictEl.innerHTML = `<div class="trade-verdict ${cls}">${icon} ${txt}${aiFactor}</div>`;
}

      </div>`;

    return `<tr>

function parseCSV(text){
  const lines=text.split(/\r?\n/), headers=splitLine(lines[0]), rows=[];
  for(let i=1;i<lines.length;i++){
    const line=lines[i].trim(); if(!line) continue;
    const vals=splitLine(line), obj={};
    headers.forEach((h,idx)=>{ obj[h.trim()]=(vals[idx]||'').trim(); });
    rows.push(obj);
  }
  return rows;
}
function splitLine(line){
  const res=[]; let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    if(line[i]==='"'){inQ=!inQ;continue;}
    if(line[i]===','&&!inQ){res.push(cur);cur='';continue;}
    cur+=line[i];
  }
  res.push(cur); return res;
}
function pNum(s){ return parseFloat((s||'').replace(/,/g,''))||0; }
// ── Grade-parser: udtræk udbyder, numerisk score og label ──
function parseGradeField(gradeStr){
  if(!gradeStr || gradeStr==='Ungraded') return { gradingProvider:'', gradeScore:null, gradeLabel:'Ungraded' };
  const s = gradeStr.trim();
  // Kendte udbydere (rækkefølge vigtig — længere matches først)
  const providers = ['PSA','BGS','CGC','TAG','ACE','AGS'];
  let provider = '';
  for(const p of providers){
    if(s.toUpperCase().startsWith(p)){ provider = p; break; }
  }
  if(!provider) return { gradingProvider:'', gradeScore:null, gradeLabel:s };
  // Udtræk numerisk score — fx "10.0", "9.5", "8"
  const scoreMatch = s.match(/([\d]+(?:\.\d+)?)/); 
  const score = scoreMatch ? parseFloat(scoreMatch[1]) : null;
  // Label = alt efter score-nummeret, trimmet
  const labelMatch = s.match(/[\d]+(?:\.\d+)?\s*(.*)/);
  const label = labelMatch ? labelMatch[1].trim() : '';
  return { gradingProvider: provider, gradeScore: score, gradeLabel: label || s };
}

function csvRowToItem(row){
  const gradeRaw = row['Grade']||'';
  const { gradingProvider, gradeScore, gradeLabel } = parseGradeField(gradeRaw);
  // Håndter skiftende kolonnenavn for markedspris (dato kan variere)
  const mktKey = Object.keys(row).find(k => k.startsWith('Market Price')) || '';
  return {
    id: Math.random().toString(36).slice(2)+Date.now().toString(36),
    portfolioName: row['Portfolio Name']||'',
    category:      row['Category']||'',
    set:           row['Set']||'',
    productName:   row['Product Name']||'',
    cardNumber:    row['Card Number']||'',
    rarity:        row['Rarity']||'',
    variance:      row['Variance']||'',
    grade:         gradeRaw,
    gradingProvider: gradingProvider,
    gradeScore:    gradeScore,
    gradeLabel:    gradeLabel,
    condition:     row['Card Condition']||'',
    costPaid:      pNum(row['Average Cost Paid']),
    quantity:      parseInt(row['Quantity'])||1,
    marketPrice:   pNum(mktKey ? row[mktKey] : row['Market Price (As of 2026-03-15)']),
    priceOverride: pNum(row['Price Override'])||0,
    watchlist:     (row['Watchlist']||'').toLowerCase()==='true',
    dateAdded:     row['Date Added']||'',
    notes:         (row['Notes']||'').replace(/;/g,'').trim(),
  };
}
// ── Smart CSV kategorisering baseret på Portfolio Name ──
function detectCategory(item){
  const pf = (item.portfolioName||'').toLowerCase().trim();
  // Eksplicit Portfolio Name-match (fra Collectr/CardTrader eksport)
  if(pf.includes('graded')) return 'graded';
  if(pf.includes('sealed')) return 'sealed';
  if(pf.includes('raw'))    return 'raw';
  // Ingen Portfolio Name sat — auto-detect fra data
  const hasGrade = item.grade && item.grade !== 'Ungraded' && item.grade !== '';
  const hasCardNumber = item.cardNumber && item.cardNumber !== '';
  const nameLower = (item.productName||'').toLowerCase();
  // Sealed-indikatorer: ingen kortnummer + sealed produktnavn-keywords
  const sealedKeywords = ['booster box','elite trainer box','etb','case','collection box','blister','tin','bundle','display','booster bundle'];
  const looksSealed = !hasCardNumber && sealedKeywords.some(k => nameLower.includes(k));
  if(hasGrade && item.gradingProvider) return 'graded';   // har udbyder = graderet
  if(hasGrade) return 'graded';                           // har grade-felt = graderet
  if(looksSealed) return 'sealed';                        // ser ud som sealed produkt
  return 'raw';                                           // default: raw/watchlist
}

let _pendingCSVFiles = null;
let _pendingCSVParsed = null;

function handleCSV(input){
  const files = Array.from(input.files);
  if(!files.length) return;
  input.value = '';

  // Parse alle filer først
  let pending = files.length;
  const allRows = [];
  files.forEach(file => {
    const r = new FileReader();
    r.onload = e => {
      parseCSV(e.target.result).forEach(row => allRows.push(row));
      pending--;
      if(pending === 0) showCSVImportModal(allRows, files.map(f=>f.name));
    };
    r.readAsText(file, 'UTF-8');
  });
}

async function executeCSVImport(){
  const modal = document.getElementById('csvImportModal');
  const modeEl = modal ? modal.querySelector('input[name="csvMode"]:checked') : null;
  const mode = modeEl ? modeEl.value : 'replace';
  const previewItems = _pendingCSVParsed || [];
  modal && modal.remove();

  if(mode === 'replace'){
    // 1) Ryd lokalt
    gradedData.length = 0;
    sealedData.length = 0;
    rawData.length = 0;
    // 2) Ryd cloud (vent på det er færdig før vi uploader nyt)
    await clearAllCloudData();
  }

  let gAdd=0, sAdd=0, rAdd=0;
  previewItems.forEach(({ item, cat }) => {
    if(cat === 'graded'){
      const dup = gradedData.find(d => d.productName===item.productName && d.cardNumber===item.cardNumber && d.grade===item.grade);
      if(!dup){ gradedData.push(item); gAdd++; }
    } else if(cat === 'sealed'){
      const dup = sealedData.find(d => d.productName===item.productName && d.set===item.set);
      if(!dup){ sealedData.push(item); sAdd++; }
    } else {
      const dup = rawData.find(d => d.productName===item.productName && d.cardNumber===item.cardNumber && d.set===item.set);
      if(!dup){ rawData.push(item); rAdd++; }
    }
  });

  // Gem lokalt
  saveAll();

  // Cloud sync — upsert alle nye items
  const toSync = [...gradedData, ...sealedData, ...rawData];
  for(const it of toSync){
    const t = gradedData.find(x=>x.id===it.id)?'graded_items':sealedData.find(x=>x.id===it.id)?'sealed_items':'raw_items';
    await upsertItem(t, it);
  }

  const parts = [];
  if(gAdd>0) parts.push(`${gAdd} graderede`);
  if(sAdd>0) parts.push(`${sAdd} sealed`);
  if(rAdd>0) parts.push(`${rAdd} raw`);
  const modeStr = mode === 'replace' ? ' (erstattet)' : ' (tilføjet)';
  showToast('✅ ' + (parts.join(', ') || '0 nye') + modeStr);
  render();
}

const eff   = i => i.priceOverride>0 ? i.priceOverride : i.marketPrice;
const totV  = i => eff(i)*i.quantity;
const totC  = i => i.costPaid*i.quantity;
const plAbs = i => totV(i)-totC(i);
const plPct = i => { const c=totC(i); return c===0?null:((totV(i)-c)/c*100); };
const fmtDKK= n => (n&&n!==0)?n.toLocaleString('da-DK',{minimumFractionDigits:0,maximumFractionDigits:0})+' DKK':'—';
const fmtP  = n => n===null?'—':(n>=0?'+':'')+n.toFixed(1)+'%';
const esc   = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function gradeClass(g){
  if(!g||g==='Ungraded') return '';
  const l=g.toLowerCase();
  // PSA grades
  if(l.startsWith('psa')){
    if(l.includes('10')) return 'pill-psa10';
    if(l.includes('9.5')||l.includes(' 9 ')) return 'pill-psa9';
    if(l.includes('8')) return 'pill-psa8';
    return 'pill-psa9';
  }
  // BGS grades
  if(l.startsWith('bgs')){
    if(l.includes('10')||l.includes('black label')) return 'pill-bgs-black';
    if(l.includes('9.5')) return 'pill-psa10';
    return 'pill-bgs';
  }
  // CGC grades
  if(l.startsWith('cgc')){
    if(l.includes('10')||l.includes('pristine')) return 'pill-psa10';
    return 'pill-cgc';
  }
  // TAG, ACE, AGS — generisk styling
  if(l.startsWith('tag')||l.startsWith('ace')||l.startsWith('ags')) return 'pill-tag';
  // Fallback: gem / mint
  if(l.includes('gem')||l.includes('pristine')) return 'pill-psa10';
  if(l.includes('mint')) return 'pill-psa9';
  if(l.includes('nm')) return 'pill-psa8';
  return 'pill-psa9';
}
function catClass(c){
  const l=(c||'').toLowerCase();
  if(l.includes('pokemon')||l.includes('pokémon')) return 'pill-poke';
  if(l.includes('one piece')) return 'pill-op';
  if(l.includes('magic')) return 'pill-mtg';
  if(l.includes('rift')) return 'pill-rb';
  return '';
}
function scoreColor(s){
  if(s>=9) return 'grade'; if(s>=7) return 'high'; if(s>=4) return 'mid'; return 'low';
}

async function analyseItem(item){
  if(!apiKey) return null;
  const prompt = buildPrompt(item);
  try {
    const res = await fetch('https://api.perplexity.ai/chat/completions', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'sonar',
        messages: [{ role: 'user', content: prompt }],
        temperature: 0.2,
        max_tokens: 600,
        search_recency_filter: 'month',
        return_citations: true,
      })
    });
    if(!res.ok){
      let errMsg = `HTTP ${res.status}`;
      try{
        const errData = await res.json();
        errMsg = errData?.error?.message || errData?.detail || errMsg;
      } catch(e2){}
      console.error('Perplexity API fejl:', res.status, errMsg);
      throw new Error(errMsg);
    }
    const data = await res.json();
    const content = data.choices?.[0]?.message?.content || '';
    // Extract JSON from response — strip markdown fences if present
    const stripped = content.replace(/```json?\s*/gi,'').replace(/```/g,'').trim();
    const jsonMatch = stripped.match(/\{[\s\S]*\}/);
    if(!jsonMatch){
      console.error('Intet JSON i svar:', content.substring(0,300));
      throw new Error('AI returnerede ikke gyldigt JSON');
    }
    const parsed = JSON.parse(jsonMatch[0]);
    parsed.timestamp = new Date().toISOString();
    parsed.citations = data.citations || [];
    return parsed;
  } catch(e) {
    console.error('Analyse fejl:', e);
    throw e; // re-throw so caller can show the real message
  }
}

async function runBatchAnalysis(){
  if(!apiKey){ showToast('❌ Tilføj en Perplexity API-nøgle først'); return; }
  if(batchRunning){ showToast('⏳ En analyse kører allerede — vent til den er færdig'); return; }
  batchRunning = true;
  const batchTab = activeTab; // gem hvilken tab der startede analysen
  batchTabRef = batchTab; // global reference til toolbar rendering
  const tabLabel = batchTab==='graded'?'Graderede kort':batchTab==='sealed'?'Sealed':'Raw kort';
  const batchBtnEl = document.getElementById('batchBtn'); if(batchBtnEl) batchBtnEl.disabled=true;

  const data = batchTab==='graded' ? gradedData : batchTab==='sealed' ? sealedData : rawData;
  const toAnalyse = data.filter(i=>!aiCache[i.id]);
  if(toAnalyse.length===0){ showToast('✅ Alle poster er allerede analyseret'); batchRunning=false; const bbz=document.getElementById('batchBtn'); if(bbz)bbz.disabled=false; return; }

  let done=0;
  // (analyseProgress opdateres via updateProg() nedenfor)

  // Hjælpefunktion: opdater kun progress hvis vi stadig er på den rigtige tab
  const updateProg = (html) => {
    // Gem i global holder (overlever render() genopbygning af toolbar)
    const globalProg = document.getElementById('analyseProgressGlobal');
    if(globalProg) globalProg.innerHTML = html;
    // Opdater synligt element hvis det findes (samme tab)
    const visibleProg = document.getElementById('analyseProgress');
    if(visibleProg) visibleProg.innerHTML = html;
    // Vis gul kant på tab-knappen hvis brugeren er skiftet væk
    const tabBtn = document.getElementById('tab-'+batchTab);
    if(tabBtn && activeTab !== batchTab) {
      tabBtn.style.outline = '2px solid var(--primary)';
    }
  };

  updateProg(`[${tabLabel}] Analyserer <span>0</span>/${toAnalyse.length} poster...`);

  for(const item of toAnalyse){
    updateProg(`[${tabLabel}] Analyserer <span>${done+1}</span>/${toAnalyse.length}: ${esc(item.productName.substring(0,35))}...`);
    try{
      const result = await analyseItem(item);
      if(result){ aiCache[item.id]=result; saveAll(); upsertAI(item.id, result); }
    } catch(e){
      const msg=(e.message||'fejl').substring(0,60);
      updateProg(`<span style="color:var(--red)">[${tabLabel}] Fejl på "${esc(item.productName.substring(0,30))}": ${esc(msg)} — fortsætter...</span>`);
      await new Promise(r=>setTimeout(r,2000));
    }
    done++;
    await new Promise(r=>setTimeout(r,800));
  }

  batchRunning=false;
  batchTabRef = null; // nulstil så toolbar ikke viser gammel status
  const batchBtnEl2 = document.getElementById('batchBtn'); if(batchBtnEl2) batchBtnEl2.disabled=false;
  // Fjern tab-highlight
  const tabBtn = document.getElementById('tab-'+batchTab);
  if(tabBtn) tabBtn.style.outline = '';
  updateProg(`<span style="color:var(--green);font-weight:700">✓ [${tabLabel}] ${done} analyser fuldført</span>`);
  if(activeTab === batchTab) render();
  showToast(`✅ Batch-analyse færdig (${tabLabel}): ${done} poster analyseret`);
}

// PSA GRADING POTENTIAL ESTIMATOR
// Based on condition → multipliers from market data
// ═══════════════════════════════════════════════════════
const PSA_MULTIPLIERS = {
  // condition (lowercase) → {psa8, psa9, psa10} multiplier vs raw price
  // Source: historical avg premiums from eBay sold data
  'mint':              {psa8:1.2, psa9:2.8,  psa10:6.5},
  'near mint':         {psa8:1.1, psa9:2.2,  psa10:4.5},
  'nm':                {psa8:1.1, psa9:2.2,  psa10:4.5},
  'near mint-mint':    {psa8:1.1, psa9:2.4,  psa10:5.0},
  'nm-mint':           {psa8:1.1, psa9:2.4,  psa10:5.0},
  'lightly played':    {psa8:1.0, psa9:1.5,  psa10:null},
  'lp':                {psa8:1.0, psa9:1.5,  psa10:null},
  'moderately played': {psa8:0.8, psa9:null,  psa10:null},
  'mp':                {psa8:0.8, psa9:null,  psa10:null},
  'heavily played':    {psa8:null, psa9:null, psa10:null},
  'hp':                {psa8:null, psa9:null, psa10:null},
  'damaged':           {psa8:null, psa9:null, psa10:null},
};

function getPSAMultipliers(condition) {
  if(!condition) return null;
  const c = condition.toLowerCase().trim();
  return PSA_MULTIPLIERS[c] || null;
}

function renderPSAPotential(item) {
  const rawPrice = totV(item);
  if(!rawPrice || rawPrice <= 0) return '<span class="psa-na">Ingen markedspris</span>';
  const mults = getPSAMultipliers(item.condition);
  if(!mults) return `<span class="psa-na" title="${esc(item.condition||'Ukendt stand')}">Stand ukendt</span>`;

  const badges = [];
  if(mults.psa8) badges.push(`<div class="psa-badge psa8"><span class="psa-grade">PSA 8</span><span class="psa-val">${fmtDKK(rawPrice * mults.psa8)}</span></div>`);
  if(mults.psa9) badges.push(`<div class="psa-badge psa9"><span class="psa-grade">PSA 9</span><span class="psa-val">${fmtDKK(rawPrice * mults.psa9)}</span></div>`);
  if(mults.psa10) badges.push(`<div class="psa-badge psa10"><span class="psa-grade">PSA 10</span><span class="psa-val">${fmtDKK(rawPrice * mults.psa10)}</span></div>`);

  if(badges.length === 0) return `<span class="psa-na" title="Stand for lav til PSA-præmium">Lav stand</span>`;
  return `<div class="psa-pot">${badges.join('')}</div>`;
}

      dragSrc = module;
      module.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', module.dataset.moduleId || '');
    });
    module.addEventListener('dragend', () => {
      module.classList.remove('dragging');
      container.querySelectorAll('.dash-module').forEach(m => m.classList.remove('drag-over'));
      saveDashLayout();
    });
    module.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if(module !== dragSrc) {
        container.querySelectorAll('.dash-module').forEach(m => m.classList.remove('drag-over'));
        module.classList.add('drag-over');
      }
    });
    module.addEventListener('dragleave', () => {
      module.classList.remove('drag-over');
    });
    module.addEventListener('drop', e => {
      e.preventDefault();
      e.stopPropagation();
      if(dragSrc && dragSrc !== module) {
        const allModules = [...container.querySelectorAll(':scope > .dash-module')];
        const srcIdx = allModules.indexOf(dragSrc);
        const tgtIdx = allModules.indexOf(module);
        if(srcIdx < tgtIdx) container.insertBefore(dragSrc, module.nextSibling);
        else container.insertBefore(dragSrc, module);
        module.classList.remove('drag-over');
        dragSrc = null;
        saveDashLayout();
      }
    });
  });
}

function applyDashLayout() {
  if(!dashLayout) return;
  const container = document.getElementById('dashModules') || document.getElementById('dashboardPanel');
  if(!container) return;
  // Reorder
  dashLayout.forEach(({ id }) => {
    const m = container.querySelector(`.dash-module[data-module-id="${id}"]`);
    if(m) container.appendChild(m);
  });
  // Apply collapsed, span, height
  dashLayout.forEach(({ id, collapsed, span, height }) => {
    const mod = container.querySelector(`.dash-module[data-module-id="${id}"]`);
    if(!mod) return;
    const body = mod.querySelector('.module-body');
    const icon = mod.querySelector('.module-toggle');
    const spanBtn = mod.querySelector('.module-span-btn');
    // Collapsed
    if(collapsed && body) { body.classList.add('collapsed'); if(icon) icon.textContent = '＋'; }
    // Span
    if(span && span !== '1') {
      mod.dataset.span = span;
    }
    // Height
    if(height && body) { body.style.height = height; body.style.overflow = 'hidden'; }
  });
}

// toggleSpan er ikke længere i brug (erstatter af corner-resize), beholdes til bagudkompatibilitet
function toggleSpan(id) {
  const mod = document.querySelector(`.dash-module[data-module-id="${id}"]`);
  if(!mod) return;
  const cur = mod.dataset.span || '1';
  mod.dataset.span = cur === '2' ? '1' : '2';
  saveDashLayout();
}

// Resize modul både højde (vertikal) og bredde/span (horisontal) via hjørne-håndtag
function startResize(e, id) {
  e.preventDefault();
  const container = document.getElementById('dashModules');
  const mod = document.querySelector(`.dash-module[data-module-id="${id}"]`);
  if(!mod || !container) return;
  const body = mod.querySelector('.module-body');
  const handle = mod.querySelector('.module-resize');
  if(!body) return;

  const startX = e.clientX;
  const startY = e.clientY;
  const startH = body.getBoundingClientRect().height;
  const containerW = container.getBoundingClientRect().width;
  const startSpan = mod.dataset.span || '1';

  if(handle) handle.classList.add('resizing');
  body.classList.add('resizing-active');

  function onMove(ev) {
    // Vertikal: ændr højde
    const dy = ev.clientY - startY;
    const newH = Math.max(80, startH + dy);
    body.style.height = newH + 'px';
    body.style.overflowY = 'auto';

    // Horisontal: skift til span 2 hvis trækker mere end 15% af containerbredden til højre
    const dx = ev.clientX - startX;
    const threshold = containerW * 0.15;
    if(dx > threshold && mod.dataset.span !== '2') {
      mod.dataset.span = '2';
    } else if(dx < -threshold && mod.dataset.span !== '1') {
      mod.dataset.span = '1';
    }
  }
  function onUp() {
    if(handle) handle.classList.remove('resizing');
    body.classList.remove('resizing-active');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    // Fortæl Chart.js at den skal genberegne størrelse
    Object.values(dashCharts).forEach(ch => { try { ch.resize(); } catch(e){} });
    saveDashLayout();
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function render(){
  const data = activeTab==='graded' ? gradedData : activeTab==='sealed' ? sealedData : rawData;

  let filtered = data.filter(item=>{
    const q=searchQ;
    const ms = !q || item.productName.toLowerCase().includes(q) || item.set.toLowerCase().includes(q) || (item.grade||'').toLowerCase().includes(q) || (item.category||'').toLowerCase().includes(q) || (item.rarity||'').toLowerCase().includes(q);
    const mc = filterCat==='Alle' || item.category===filterCat;
    return ms && mc;
  });

  filtered.sort((a,b)=>{
    let av,bv;
    if(sortCol==='name')  {av=a.productName;bv=b.productName;}
    else if(sortCol==='set'){av=a.set;bv=b.set;}
    else if(sortCol==='cost'){av=totC(a);bv=totC(b);}
    else if(sortCol==='value'){av=totV(a);bv=totV(b);}
    else if(sortCol==='pl'){av=plAbs(a);bv=plAbs(b);}
    else if(sortCol==='date'){av=a.dateAdded;bv=b.dateAdded;}
    else if(sortCol==='qty'){av=a.quantity;bv=b.quantity;}
    else if(sortCol==='score'){av=aiCache[a.id]?.overall_score||0;bv=aiCache[b.id]?.overall_score||0;}
    else if(sortCol==='rarity'){av=a.rarity||'';bv=b.rarity||'';}
    else if(sortCol==='cond'){av=a.condition||'';bv=b.condition||'';}
    else {av=a.productName;bv=b.productName;}
    if(typeof av==='string') return sortAsc?av.localeCompare(bv):bv.localeCompare(av);
    return sortAsc?av-bv:bv-av;
  });

  renderSummary(data, filtered);
  renderToolbar(data);
  renderTable(filtered);
}

function renderSummary(data, filtered){
  const tc=data.reduce((s,i)=>s+totC(i),0);
  const tv=data.reduce((s,i)=>s+totV(i),0);
  const tp=tv-tc;
  const pct=tc>0?(tp/tc*100):0;
  const cnt=data.reduce((s,i)=>s+i.quantity,0);
  const analysed=data.filter(i=>aiCache[i.id]).length;
  const plClass=tp>=0?'green':'red';
  const pctStr=(pct>=0?'+':'')+pct.toFixed(1)+'%';
  // For raw: show grading candidates (score >= 7)
  const gradeCandidates = activeTab==='raw' ? data.filter(i=>aiCache[i.id]&&aiCache[i.id].recommendation==='Send til grading').length : 0;

  document.getElementById('summaryBar').innerHTML=
    `<div class="stat"><span class="stat-lbl">Poster:</span><span class="stat-val">${data.length} (${cnt} stk)</span></div>`+
    `<div class="sdiv"></div>`+
    `<div class="stat"><span class="stat-lbl">Kostpris:</span><span class="stat-val">${fmtDKK(tc)}</span></div>`+
    `<div class="sdiv"></div>`+
    `<div class="stat"><span class="stat-lbl">Markedsværdi:</span><span class="stat-val gold">${fmtDKK(tv)}</span></div>`+
    `<div class="sdiv"></div>`+
    `<div class="stat"><span class="stat-lbl">P/L:</span><span class="stat-val ${plClass}">${fmtDKK(tp)} (${pctStr})</span></div>`+
    (analysed>0?`<div class="sdiv"></div><div class="stat"><span class="stat-lbl">AI-analyseret:</span><span class="stat-val blue">${analysed}/${data.length}</span></div>`:'')+
    (gradeCandidates>0?`<div class="sdiv"></div><div class="stat"><span class="stat-lbl">Send til grading:</span><span class="stat-val" style="color:var(--teal);font-weight:700">${gradeCandidates} kort</span></div>`:'');
}

function renderToolbar(data){
  const cats=['Alle',...new Set(data.map(d=>d.category).filter(Boolean))];
  const chips=cats.map(c=>`<button class="chip${filterCat===c?' active':''}" onclick="setFilterCat('${esc(c)}')">${esc(c)}</button>`).join('');
  const sortOpts=activeTab==='graded'
    ?`<option value="name">Navn</option><option value="set">Sæt</option><option value="score">AI-score</option><option value="value">Markedspris</option><option value="pl">P/L</option><option value="date">Dato</option>`
    :activeTab==='raw'
    ?`<option value="name">Navn</option><option value="set">Sæt</option><option value="rarity">Raritet</option><option value="score">AI-score</option><option value="value">Markedspris</option><option value="pl">P/L</option><option value="date">Dato</option>`
    :`<option value="name">Navn</option><option value="set">Sæt</option><option value="qty">Antal</option><option value="score">AI-score</option><option value="value">Markedspris</option><option value="pl">P/L</option>`;
  // Vis kun progress på den tab der faktisk kører analysen
  const isAnalysingThisTab = batchRunning && (typeof batchTabRef !== 'undefined') && batchTabRef === activeTab;
  const globalProgEl = document.getElementById('analyseProgressGlobal');
  const progHtml = isAnalysingThisTab && globalProgEl
    ? `<div class="analyse-progress" id="analyseProgress" style="flex:1">${globalProgEl.innerHTML}</div>`
    : `<div class="analyse-progress" id="analyseProgress" style="flex:1"></div>`;
  document.getElementById('toolbar').innerHTML=chips+`<div class="tb-sep"></div><select class="sort-sel" onchange="setSort(this.value)" id="sortSel">${sortOpts}</select><div class="tb-sep"></div><button class="btn-analyse-all" id="batchBtn" onclick="runBatchAnalysis()" ${apiKey?'':'disabled'}>` +
    `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2a10 10 0 1 0 10 10"/><path d="m17 7 5-5"/><path d="M17 2h5v5"/></svg> Analyser alle (AI)</button>`+progHtml;
  document.getElementById('sortSel').value=sortCol;
}

function setFilterCat(c){ filterCat=c; render(); }
function setSort(c){ sortCol===c?sortAsc=!sortAsc:(sortCol=c,sortAsc=true); render(); }
function thA(c){ const s=sortCol===c; return `<span class="s-arr">${s?(sortAsc?'↑':'↓'):'↕'}</span>`; }

function renderAICell(item){
  const ai=aiCache[item.id];
  const hasKey=!!apiKey;
  if(!ai){
    if(!hasKey) return `<td class="ai-cell"><span class="score-badge score-na">Ingen API-nøgle</span></td>`;
    return `<td class="ai-cell"><button class="btn-analyse" id="abtn-${item.id}" onclick="runSingleAnalysis('${item.id}')">🤖 Analysér</button></td>`;
  }
  const rec=ai.recommendation||'Uafgjort';
  const score=ai.overall_score||0;
  const cls=rec==='Sælg'||rec==='Sell'||rec===t('sell')?'score-sell':rec==='Send til grading'||rec==='Send to grading'||rec===t('grade')?'score-grade':score>=9?'score-grade':score>=7?'score-hold':'score-sell';
  const expanded=expandedRow===item.id;
  return `<td class="ai-cell">
    <div style="display:flex;align-items:center;gap:.35rem;flex-wrap:wrap">
      <button class="score-badge ${cls}" onclick="toggleDetail('${item.id}')" title="${esc(ai.key_factor||'')}">
        ${score}/10 · ${esc(rec)}${expanded?' ▲':' ▼'}
      </button>
      <button class="btn-analyse" id="abtn-${item.id}" onclick="runSingleAnalysis('${item.id}')" title="Genanalysér">↺</button>
    </div>
  </td>`;
}

function toggleDetail(id){
  expandedRow = expandedRow===id ? null : id;
  render();
}

function renderAIDetailRow(item, colSpan){
  const ai=aiCache[item.id];
  if(!ai||expandedRow!==item.id) return '';
  const rec=ai.recommendation||'';
  const recCls=rec===t('sell')||rec==='Sælg'||rec==='Sell'?'ai-rec-sell':(rec===t('grade')||rec==='Send til grading'||rec==='Send to grading')?'ai-rec-grade':'ai-rec-hold';
  const dims=ai.dimensions||{};
  const dr=ai.dimension_reasoning||{};
  const dimDefs=[
    {k:'price_trend', label:t('dim_pristrend'), reasonKey:'price_trend_reasoning', icon:'📈',
     tooltip: t('dim_pristrend_tip')},
    {k:'demand',      label:t('dim_eftersp'),   reasonKey:'demand_reasoning',      icon:'🔥',
     tooltip: t('dim_eftersp_tip')},
    {k:'roi_potential',label:t('dim_roi'),      reasonKey:'roi_reasoning',         icon:'💰',
     tooltip: t('dim_roi_tip')},
  ];
  const dimsHtml=dimDefs.map(({k,label,reasonKey,icon,tooltip})=>{
    const v=dims[k]||0;
    const cls=scoreColor(v);
    const reason=dr[reasonKey]||tooltip;
    const uid=item.id+'-'+k;
    return `<div class="score-dim" onclick="toggleDimExpand('${uid}',event)" title="${t('click_details')}">
      <div class="score-dim-label">${label}</div>
      <div class="score-dim-val ${cls}">${v}/10</div>
      <div class="dim-expand" id="dim-${uid}">
        <div class="dim-expand-title">${icon} ${label}</div>
        <div>${esc(reason)}</div>
      </div>
    </div>`;
  }).join('');

        <span class="ai-detail-title">🤖 ${t('ai_analyse')} · ${esc(item.productName)}</span>

      <div><span class="ai-rec-chip ${recCls}">${recIcon} ${esc(rec)}</span></div>
      <div class="ai-scores-row">${dimsHtml}</div>
      <div class="ai-reasoning">${esc(ai.reasoning||'')}</div>
      ${ai.key_factor?`<div style="margin-top:.4rem;font-size:.75rem;font-weight:700;color:var(--muted)">${t('key_factor')}: <span style="color:var(--text)">${esc(ai.key_factor)}</span></div>`:''}
      <div class="eu-panel-wrap eu-panel-${item.id}">${renderEUPricePanel(item)}</div>
      ${citations.length?`<div class="ai-sources">${t('sources')}: ${citations.map(c=>{try{return `<a href="${esc(c)}" target="_blank" style="color:var(--blue)">${new URL(c).hostname}</a>`}catch(e){return esc(c)}}).join(' · ')}</div>`:''}
      ${ts?`<div class="ai-timestamp">${t('analysed')}: ${ts}</div>`:''}
      </div><!-- end ai-detail-main -->
    </div>
  </td></tr>`;
}

function toggleDimExpand(uid, e){
  e.stopPropagation();
  const el=document.getElementById('dim-'+uid);
  if(!el) return;
  const isOpen=el.classList.contains('open');
  // Close all others first
  document.querySelectorAll('.dim-expand.open').forEach(d=>d.classList.remove('open'));
  if(!isOpen) el.classList.add('open');
}

function submitForm(){
  const name=document.getElementById('mName')?.value.trim();
  if(!name){alert('Udfyld venligst produktnavn.');return;}
  const item={
    id:Math.random().toString(36).slice(2)+Date.now().toString(36),
    productName:name,
    set:document.getElementById('mSet')?.value.trim()||'',
    category:document.getElementById('mCat')?.value||'Pokemon',
    cardNumber:document.getElementById('mNum')?.value.trim()||'',
    rarity:document.getElementById('mRarity')?.value.trim()||'',
    grade:document.getElementById('mGrade')?.value||'',
    condition:document.getElementById('mCond')?.value||'Near Mint',
    quantity:parseInt(document.getElementById('mQty')?.value)||1,
    costPaid:parseFloat(document.getElementById('mCost')?.value)||0,
    marketPrice:parseFloat(document.getElementById('mMkt')?.value)||0,
    priceOverride:0,watchlist:false,
    dateAdded:document.getElementById('mDate')?.value||'',
    notes:document.getElementById('mNotes')?.value.trim()||'',
    portfolioName:activeTab==='graded'?'Graded portfolio':activeTab==='raw'?'Raw portfolio':'Sealed portfolio',
    variance:'',
  };
  if(activeTab==='graded') gradedData.push(item);
  else if(activeTab==='raw') rawData.push(item);
  else sealedData.push(item);
  saveAll();
  // Cloud sync
  const _tbl = activeTab==='graded'?'graded_items':activeTab==='raw'?'raw_items':'sealed_items';
  upsertItem(_tbl, item);
  closeModal(); render();
  showToast('✅ Tilføjet: '+name);
}
function closeModal(){ document.getElementById('modalBackdrop').classList.remove('open'); }

function deleteItem(id){
  if(!confirm('Slet denne post?')) return;
  const _delTbl = activeTab==='graded'?'graded_items':activeTab==='sealed'?'sealed_items':'raw_items';
  if(activeTab==='graded') gradedData=gradedData.filter(i=>i.id!==id);
  else if(activeTab==='sealed') sealedData=sealedData.filter(i=>i.id!==id);
  else rawData=rawData.filter(i=>i.id!==id);
  delete aiCache[id];
  saveAll();
  deleteItem(_delTbl, id);
  render();
}

function t(key){ return (TRANSLATIONS[currentLang]||TRANSLATIONS['en'])[key] || TRANSLATIONS['en'][key] || key; }

function setLang(lang){
  currentLang = lang;
  localStorage.setItem('pf_lang', lang);
  document.getElementById('langSel').value = lang;
  applyLang();
  if(activeTab==='overview') renderDashboard(); else render();
}

function applyLang(){
  // Tabs
  document.getElementById('tab-overview').textContent = t('tab_overview');
  document.getElementById('tab-graded').textContent   = t('tab_graded');
  document.getElementById('tab-sealed').textContent   = t('tab_sealed');
  document.getElementById('tab-raw').textContent      = t('tab_raw');
  // Search
  const si = document.getElementById('searchInput');
  if(si) si.placeholder = t('search_ph');
  // API banner
  const al = document.querySelector('.api-key-label');
  if(al) al.textContent = t('api_label');
  const ask = document.querySelector('.btn-save-key');
  if(ask) ask.textContent = t('api_save');
  const ks = document.getElementById('keyStatus');
  if(ks && !apiKey) ks.textContent = t('api_no_key');
  const alink = document.querySelector('.api-banner a');
  if(alink) alink.textContent = t('api_link');
  // Batch button
  const bb = document.getElementById('batchBtn');
  if(bb) bb.childNodes[bb.childNodes.length-1].textContent = ' ' + t('analyse_all');
  // Upload label
  const ulbl = document.querySelector('.btn-primary .lbl');
  if(ulbl) ulbl.textContent = t('upload_csv');
  // Add button
  const addlbl = document.querySelectorAll('.btn-primary .lbl')[1];
  if(addlbl) addlbl.textContent = t('add');
}
